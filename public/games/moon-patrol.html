    // ============================================================
    // PARALLAX MOUNTAIN SILHOUETTES
    // Three layers of mountains at different depths
    // ============================================================
    const mountainLayers = [
      { points: [], speed: 0.15, heightBase: 160, heightVar: 40 }, // Far
      { points: [], speed: 0.4,  heightBase: 130, heightVar: 50 }, // Mid
      { points: [], speed: 0.8,  heightBase: 100, heightVar: 60 }  // Near
    ];

    function initMountains() {
      for (const layer of mountainLayers) {
        layer.points = [];
        for (let x = 0; x < canvas.width + 200; x += 60) {
          layer.points.push({
            x: x,
            height: layer.heightBase + (Math.random() - 0.5) * layer.heightVar * 2
          });
        }
      }
    }

    function updateMountains() {
      for (const layer of mountainLayers) {
        for (const pt of layer.points) {
          pt.x -= layer.speed * difficulty * deltaTime;
        }
        // Recycle points that scroll off
        if (layer.points.length > 0 && layer.points[0].x < -60) {
          const removed = layer.points.shift();
          const last = layer.points[layer.points.length - 1];
          removed.x = last.x + 60;
          removed.height = layer.heightBase + (Math.random() - 0.5) * layer.heightVar * 2;
          layer.points.push(removed);
        }
      }
    }

    function drawMountains() {
      const theme = getThemeColors(getCurrentTheme());
      const colors = [theme.mountainFar, theme.mountainMid, theme.mountainNear];

      for (let li = 0; li < mountainLayers.length; li++) {
        const layer = mountainLayers[li];
        ctx.fillStyle = colors[li];
        ctx.beginPath();
        ctx.moveTo(0, GROUND_Y);

        for (let i = 0; i < layer.points.length; i++) {
          const pt = layer.points[i];
          const nextPt = layer.points[i + 1] || { x: pt.x + 60, height: pt.height };
          // Smooth mountain peaks using quadratic curves
          const midX = (pt.x + nextPt.x) / 2;
          ctx.lineTo(pt.x, GROUND_Y - pt.height);
          ctx.quadraticCurveTo(midX, GROUND_Y - Math.max(pt.height, nextPt.height) - 10, nextPt.x, GROUND_Y - nextPt.height);
        }

        ctx.lineTo(canvas.width + 100, GROUND_Y);
        ctx.closePath();
        ctx.fill();
      }
    }

    // ============================================================
    // PARALLAX STARS
    // ============================================================
    const stars = [];

    function initStars() {
      stars.length = 0;
      for (let i = 0; i < 120; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * (PLATFORM_Y - 40),
          size: Math.random() * 2 + 0.5,
          speed: Math.random() * 0.5 + 0.1,
          brightness: Math.random() * 0.6 + 0.4
        });
      }
    }

    function updateStars() {
      for (const star of stars) {
        star.x -= star.speed * deltaTime;
        if (star.x < 0) {
          star.x = canvas.width;
          star.y = Math.random() * (PLATFORM_Y - 40);
        }
      }
    }

    function drawStars() {
      const theme = getThemeColors(getCurrentTheme());
      const [r, g, b] = theme.starTint;
      for (const star of stars) {
        const flicker = Math.sin(frameCount * 0.05 + star.x) * 0.2 + 0.8;
        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${star.brightness * flicker})`;
        ctx.fillRect(star.x, star.y, star.size, star.size);
      }
    }

    // ============================================================
    // TERRAIN SYSTEM (with gaps)
    // ============================================================
    const terrainSegments = [];
    const platformSegments = [];

    function initTerrain() {
      terrainSegments.length = 0;
      platformSegments.length = 0;

      for (let x = 0; x < canvas.width + 200; x += 40) {
        terrainSegments.push({ x: x, height: 6 + Math.random() * 4, isGap: false });
      }
      for (let x = 0; x < canvas.width + 200; x += 40) {
        platformSegments.push({ x: x, active: true });
      }
    }

    function updateTerrain() {
      const speed = SCROLL_SPEED * difficulty * deltaTime;

      for (const seg of terrainSegments) seg.x -= speed;
      if (terrainSegments.length > 0 && terrainSegments[0].x < -40) {
        const removed = terrainSegments.shift();
        const last = terrainSegments[terrainSegments.length - 1];
        removed.x = last.x + 40;
        removed.height = 6 + Math.random() * 4;
        // Randomly create terrain gaps (only on ground, more frequent at higher difficulty)
        removed.isGap = Math.random() < 0.02 * difficulty;
        terrainSegments.push(removed);
      }

      for (const seg of platformSegments) seg.x -= speed;
      if (platformSegments.length > 0 && platformSegments[0].x < -40) {
        const removed = platformSegments.shift();
        const last = platformSegments[platformSegments.length - 1];
        removed.x = last.x + 40;
        platformSegments.push(removed);
      }
    }

    function drawTerrain() {
      const theme = getThemeColors(getCurrentTheme());

      // Ground segments (skip gaps)
      for (const seg of terrainSegments) {
        if (seg.isGap) {
          // Draw gap as a dark pit with danger edges
          ctx.fillStyle = '#111';
          ctx.fillRect(seg.x, GROUND_Y, 42, 100);
          ctx.fillStyle = '#f44';
          ctx.fillRect(seg.x, GROUND_Y, 2, 6);
          ctx.fillRect(seg.x + 40, GROUND_Y, 2, 6);
        } else {
          ctx.fillStyle = theme.ground;
          ctx.fillRect(seg.x, GROUND_Y, 42, seg.height + 100);
        }
      }
      ctx.fillStyle = theme.groundSurface;
      // Draw surface line only on non-gap segments
      for (const seg of terrainSegments) {
        if (!seg.isGap) {
          ctx.fillRect(seg.x, GROUND_Y, 42, 3);
        }
      }

      // Platform
      ctx.fillStyle = theme.platform;
      for (const seg of platformSegments) {
        if (seg.active) ctx.fillRect(seg.x, PLATFORM_Y, 42, 8);
      }

      ctx.fillStyle = theme.supports;
      for (let x = 0; x < canvas.width; x += 80) {
        const drawX = x - (scrollOffset % 80);
        ctx.fillRect(drawX + 18, PLATFORM_Y + 8, 4, GROUND_Y - PLATFORM_Y - 8);
      }

      ctx.fillStyle = theme.platformSurface;
      ctx.fillRect(0, PLATFORM_Y, canvas.width, 2);
    }

    // Check if player is over a terrain gap (for falling)
    function checkTerrainGaps() {
      if (player.lane !== 'ground' || player.targetLane !== 'ground') return;
      if (player.isJumping && player.vy < 0) return; // Still going up

      for (const seg of terrainSegments) {
        if (seg.isGap &&
            player.x + player.width > seg.x + 5 &&
            player.x < seg.x + 37 &&
            !player.isJumping) {
          // Fall into the gap - lose a life (jump the player out)
          player.vy = JUMP_FORCE;
          player.isJumping = true;
          loseLife();
          return;
        }
      }
    }

    // ============================================================
    // OBSTACLE SYSTEM
    // ============================================================
    const obstacles = [];

    function spawnObstacle() {
      // Ground lane obstacle
      const type = Math.random() < 0.5 ? 'rock' : 'crater';
      const width = 25 + Math.random() * 20;
      const height = type === 'rock' ? (20 + Math.random() * 15) : 10;
      obstacles.push({
        x: canvas.width + 50,
        y: GROUND_Y - height,
        width: width,
        height: height,
        type: type,
        lane: 'ground',
        passed: false
      });
    }

    function spawnUpperObstacle() {
      const width = 25 + Math.random() * 20;
      const height = 20 + Math.random() * 15;
      obstacles.push({
        x: canvas.width + 50,
        y: PLATFORM_Y - height,
        width: width,
        height: height,
        type: 'rock',
        lane: 'upper',
        passed: false
      });
    }

    function updateObstacles() {
      const speed = SCROLL_SPEED * difficulty;

      for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x -= speed;

        const obs = obstacles[i];
        if (!obs.passed && obs.x + obs.width < player.x) {
          obs.passed = true;
          checkNearMiss(obs);
        }

        // Check laser hits on obstacles (rocks only)
        if (obs.type === 'rock') {
          for (let j = lasers.length - 1; j >= 0; j--) {
            const l = lasers[j];
            if (
              l.x < obs.x + obs.width &&
              l.x + l.width > obs.x &&
              l.y < obs.y + obs.height &&
              l.y + l.height > obs.y
            ) {
              lasers.splice(j, 1);
              score += 50;
              rocksDestroyed++;
              comboPopups.push({
                x: obs.x + obs.width / 2,
                y: obs.y - 10,
                text: '+50',
                life: 50,
                color: '#0f8'
              });
              spawnSmallExplosion(obs.x + obs.width / 2, obs.y + obs.height / 2);
              sfxHitEnemy();
              obstacles.splice(i, 1);
              break;
            }
          }
        }

        if (i < obstacles.length && obs.x + obs.width < -50) {
          obstacles.splice(i, 1);
        }
      }

      const spawnRate = Math.max(80, 160 - difficulty * 12);
      if (frameCount % spawnRate === 0 && !bossActive) {
        spawnObstacle();
      }
    }

    function drawObstacles() {
      const theme = getCurrentTheme();

      for (const obs of obstacles) {
        // Skip upper lane rocks here — drawn after darkness in drawUpperObstacleGlow
        if (obs.type === 'rock' && obs.lane === 'upper') {
          // Fiery rocks on upper lane
          const flicker = Math.sin(frameCount * 0.2 + obs.x * 0.1) * 0.15;
          const cx = obs.x + obs.width / 2;
          const cy = obs.y + obs.height / 2;

          const grd = ctx.createRadialGradient(cx, cy - 5, 2, cx, cy - 5, obs.width * 0.8);
          grd.addColorStop(0, `rgba(255, 120, 0, ${0.4 + flicker})`);
          grd.addColorStop(0.5, `rgba(255, 50, 0, ${0.2 + flicker})`);
          grd.addColorStop(1, 'rgba(255, 0, 0, 0)');
          ctx.fillStyle = grd;
          ctx.fillRect(obs.x - 10, obs.y - 15, obs.width + 20, obs.height + 20);

          ctx.fillStyle = '#442';
          ctx.beginPath();
          ctx.moveTo(obs.x, obs.y + obs.height);
          ctx.lineTo(obs.x + 5, obs.y + 5);
          ctx.lineTo(obs.x + obs.width * 0.4, obs.y);
          ctx.lineTo(obs.x + obs.width * 0.7, obs.y + 3);
          ctx.lineTo(obs.x + obs.width, obs.y + obs.height);
          ctx.closePath();
          ctx.fill();

          ctx.strokeStyle = `rgba(255, ${Math.floor(80 + flicker * 200)}, 0, 0.9)`;
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(obs.x + obs.width * 0.2, obs.y + obs.height);
          ctx.lineTo(obs.x + obs.width * 0.35, obs.y + obs.height * 0.4);
          ctx.lineTo(obs.x + obs.width * 0.5, obs.y + obs.height * 0.7);
          ctx.lineTo(obs.x + obs.width * 0.65, obs.y + obs.height * 0.2);
          ctx.stroke();

          ctx.strokeStyle = `rgba(255, 160, 30, ${0.6 + flicker})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(obs.x + 5, obs.y + 5);
          ctx.lineTo(obs.x + obs.width * 0.4, obs.y);
          ctx.lineTo(obs.x + obs.width * 0.7, obs.y + 3);
          ctx.stroke();

          for (let f = 0; f < 3; f++) {
            const fx = obs.x + obs.width * (0.2 + f * 0.3);
            const fy = obs.y - 2 - Math.abs(Math.sin(frameCount * 0.15 + f * 2)) * 8;
            const fs = 2 + Math.sin(frameCount * 0.2 + f) * 1;
            ctx.fillStyle = f === 1 ? `rgba(255, 255, 50, ${0.7 + flicker})` : `rgba(255, 100, 0, ${0.6 + flicker})`;
            ctx.beginPath();
            ctx.arc(fx, fy, fs, 0, Math.PI * 2);
            ctx.fill();
          }
        } else if (obs.type === 'rock') {
            const baseColor = theme === 'mars' ? '#a05030' : theme === 'asteroid' ? '#6a6a8a' : '#888';
            const highlightColor = theme === 'mars' ? '#c07050' : theme === 'asteroid' ? '#8a8aaa' : '#aaa';

            ctx.fillStyle = baseColor;
            ctx.beginPath();
            ctx.moveTo(obs.x, obs.y + obs.height);
            ctx.lineTo(obs.x + 5, obs.y + 5);
            ctx.lineTo(obs.x + obs.width * 0.4, obs.y);
            ctx.lineTo(obs.x + obs.width * 0.7, obs.y + 3);
            ctx.lineTo(obs.x + obs.width, obs.y + obs.height);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = highlightColor;
            ctx.beginPath();
            ctx.moveTo(obs.x + 5, obs.y + 5);
            ctx.lineTo(obs.x + obs.width * 0.4, obs.y);
            ctx.lineTo(obs.x + obs.width * 0.35, obs.y + obs.height * 0.5);
            ctx.closePath();
            ctx.fill();
        } else {
          ctx.fillStyle = '#222';
          ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
          ctx.strokeStyle = '#555';
          ctx.lineWidth = 2;
          ctx.strokeRect(obs.x, obs.y, obs.width, obs.height);
        }
      }
    }

    // No-op, upper obstacles now drawn in drawObstacles before darkness
    function drawUpperObstacleGlow() {}

    // ============================================================
    // OBSTACLE WARNING INDICATORS
    // Shows arrow icons at screen edge for incoming obstacles/UFOs
    // ============================================================
    function drawWarningIndicators() {
      // Warning for obstacles approaching from the right
      for (const obs of obstacles) {
        if (obs.x > canvas.width - 50 && obs.x < canvas.width + 80) {
          const arrowY = obs.y + obs.height / 2;
          const pulse = Math.sin(frameCount * 0.2) * 0.4 + 0.6;

          // Warning triangle
          ctx.fillStyle = obs.lane === player.lane
            ? `rgba(255, 50, 50, ${pulse})`   // Red if same lane (danger!)
            : `rgba(255, 200, 50, ${pulse * 0.5})`; // Dim yellow if different lane

          ctx.beginPath();
          ctx.moveTo(canvas.width - 15, arrowY);
          ctx.lineTo(canvas.width - 5, arrowY - 6);
          ctx.lineTo(canvas.width - 5, arrowY + 6);
          ctx.closePath();
          ctx.fill();

          // Exclamation mark for same-lane danger
          if (obs.lane === player.lane) {
            ctx.fillStyle = `rgba(255, 255, 255, ${pulse})`;
            ctx.font = 'bold 10px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('!', canvas.width - 10, arrowY + 3);
          }
        }
      }

      // Warning for UFOs
      for (const ufo of ufos) {
        if (ufo.x > canvas.width - 30 && ufo.x < canvas.width + 60) {
          const arrowY = ufo.y + ufo.height / 2;
          const pulse = Math.sin(frameCount * 0.25) * 0.4 + 0.6;

          ctx.fillStyle = `rgba(200, 100, 255, ${pulse})`;
          ctx.beginPath();
          ctx.moveTo(canvas.width - 15, arrowY);
          ctx.lineTo(canvas.width - 5, arrowY - 8);
          ctx.lineTo(canvas.width - 5, arrowY + 8);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = `rgba(255, 255, 255, ${pulse})`;
          ctx.font = 'bold 9px Courier New';
          ctx.textAlign = 'center';
          ctx.fillText('UFO', canvas.width - 10, arrowY + 3);
        }
      }

      // Warning for terrain gaps ahead
      for (const seg of terrainSegments) {
        if (seg.isGap && seg.x > canvas.width - 80 && seg.x < canvas.width + 40) {
          if (player.lane === 'ground') {
            const pulse = Math.sin(frameCount * 0.3) * 0.5 + 0.5;
            ctx.fillStyle = `rgba(255, 100, 0, ${pulse})`;
            ctx.font = 'bold 12px Courier New';
            ctx.textAlign = 'right';
            ctx.fillText('GAP!', canvas.width - 5, GROUND_Y - 10);
          }
        }
      }
    }

    // ============================================================
    // NEAR-MISS COMBO SYSTEM
    // ============================================================
    function checkNearMiss(obs) {
      const playerBottom = player.y + player.height;
      const playerTop = player.y;
      const obsBottom = obs.y + obs.height;
      const obsTop = obs.y;

      const verticallyClose = playerBottom > obsTop - NEAR_MISS_THRESHOLD &&
                               playerTop < obsBottom + NEAR_MISS_THRESHOLD;
      const horizontalDist = Math.abs((player.x + player.width) - (obs.x + obs.width));

      if (verticallyClose && horizontalDist < player.width + NEAR_MISS_THRESHOLD) {
        comboCount++;
        comboTimer = 120;

        const comboMultiplier = Math.min(comboCount, 10);
        const bonus = 50 * comboMultiplier;
        score += bonus;
        lastComboScore = bonus;

        comboPopups.push({
          x: player.x + player.width / 2,
          y: player.y - 20,
          text: comboCount > 1 ? `+${bonus} x${comboCount} COMBO!` : `+${bonus} CLOSE!`,
          life: 80,
          color: comboCount > 3 ? '#ff0' : comboCount > 1 ? cb('#0f0', '#4af') : '#fff'
        });
        sfxNearMiss();
      }
    }

    function updateComboSystem() {
      if (comboTimer > 0) {
        comboTimer--;
        if (comboTimer <= 0) comboCount = 0;
      }
      for (let i = comboPopups.length - 1; i >= 0; i--) {
        comboPopups[i].y -= 1.2 * deltaTime;
        comboPopups[i].life--;
        if (comboPopups[i].life <= 0) comboPopups.splice(i, 1);
      }
    }

    function drawComboPopups() {
      for (const popup of comboPopups) {
        const alpha = popup.life / 80;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = popup.color;
        ctx.font = 'bold 16px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText(popup.text, popup.x, popup.y);
        ctx.globalAlpha = 1;
      }
    }

    // ============================================================
    // POWER-UP SYSTEM
    // ============================================================
    const powerups = [];

    function spawnPowerup() {
      const lane = Math.random() < 0.5 ? 'ground' : 'upper';
      const laneY = lane === 'ground' ? GROUND_Y : PLATFORM_Y;
      const type = Math.random() < 0.5 ? 'flashlight' : 'shield';

      powerups.push({
        x: canvas.width + 50,
        y: laneY - 30,
        radius: 12,
        type: type,
        lane: lane,
        pulse: 0
      });
    }

    function updatePowerups() {
      const speed = SCROLL_SPEED * difficulty;

      for (let i = powerups.length - 1; i >= 0; i--) {
        powerups[i].x -= speed;
        powerups[i].pulse += 0.08;

        if (powerups[i].x < -30) { powerups.splice(i, 1); continue; }

        const p = powerups[i];
        const dx = (player.x + player.width / 2) - p.x;
        const dy = (player.y + player.height / 2) - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < p.radius + 25) {
          const px = player.x + player.width / 2;
          const py = player.y + player.height / 2;
          if (p.type === 'flashlight') {
            player.lightRadius = BOOSTED_LIGHT_RADIUS;
            player.lightTimer = 300;
            lightPickupAnim = 30;
            spawnPickupEffect(px, py, '#ff0', '#ffa', 'LIGHT!');
          } else if (p.type === 'shield') {
            player.hasShield = true;
            player.shieldTimer = 600;
            shieldPickupAnim = 30;
            spawnPickupEffect(px, py, '#48f', '#8af', 'SHIELD!');
          }
          powerups.splice(i, 1);
          sfxPowerup();
        }
      }

      if (frameCount % 300 === 0) spawnPowerup();
    }

    function drawPowerups() {
      for (const p of powerups) {
        const glow = Math.sin(p.pulse) * 0.3 + 0.7;
        if (p.type === 'flashlight') {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius + 4, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 100, ${glow * 0.3})`;
          ctx.fill();
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 50, ${glow})`;
          ctx.fill();
          ctx.fillStyle = '#000';
          ctx.font = 'bold 12px Courier New';
          ctx.textAlign = 'center';
          ctx.fillText('L', p.x, p.y + 4);
        } else {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius + 4, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(100, 150, 255, ${glow * 0.3})`;
          ctx.fill();
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(80, 130, 255, ${glow})`;
          ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 12px Courier New';
          ctx.textAlign = 'center';
          ctx.fillText('S', p.x, p.y + 4);
        }
      }
    }

    // ============================================================
    // DUST PARTICLES
    // ============================================================
    const particles = [];

    function spawnDustParticles() {
      for (let i = 0; i < 8; i++) {
        particles.push({
          x: player.x + player.width / 2 + (Math.random() - 0.5) * 20,
          y: player.y + player.height,
          vx: (Math.random() - 0.5) * 3,
          vy: Math.random() * -2,
          life: 30 + Math.random() * 20,
          size: 2 + Math.random() * 3
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * deltaTime;
        p.y += p.vy * deltaTime;
        p.vy += 0.05 * deltaTime;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function drawParticles() {
      for (const p of particles) {
        const alpha = p.life / 50;
        ctx.fillStyle = `rgba(180, 150, 100, ${alpha})`;
        ctx.fillRect(p.x, p.y, p.size, p.size);
      }
    }

    // ============================================================
    // EXPLOSION SYSTEM
    // ============================================================
    function spawnMassiveExplosion() {
      const cx = player.x + player.width / 2;
      const cy = player.y + player.height / 2;

      // Core fireball - 80 bright particles
      for (let i = 0; i < 80; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 3 + Math.random() * 10;
        explosionParticles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 3,
          life: 80 + Math.random() * 60,
          size: 3 + Math.random() * 8,
          color: Math.random() < 0.25 ? '#fff' : Math.random() < 0.4 ? '#ff4' : Math.random() < 0.6 ? '#f42' : '#f80'
        });
      }
      // Shockwave ring particles
      for (let i = 0; i < 36; i++) {
        const angle = (i / 36) * Math.PI * 2;
        const speed = 6 + Math.random() * 3;
        explosionParticles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed * 0.4,
          life: 50 + Math.random() * 20,
          size: 2 + Math.random() * 3,
          color: '#ffa'
        });
      }
      // Smoke cloud - big dark particles
      for (let i = 0; i < 25; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 4;
        explosionParticles.push({
          x: cx + (Math.random() - 0.5) * 40,
          y: cy + (Math.random() - 0.5) * 20,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 4,
          life: 120 + Math.random() * 60,
          size: 6 + Math.random() * 10,
          color: Math.random() < 0.5 ? '#555' : '#333'
        });
      }
      // Sparks - small fast particles
      for (let i = 0; i < 30; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 5 + Math.random() * 12;
        explosionParticles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 5,
          life: 40 + Math.random() * 30,
          size: 1 + Math.random() * 2,
          color: '#ff8'
        });
      }
      // Secondary delayed bursts (slightly offset)
      for (let b = 0; b < 3; b++) {
        const ox = (Math.random() - 0.5) * 50;
        const oy = (Math.random() - 0.5) * 25;
        for (let i = 0; i < 15; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 2 + Math.random() * 6;
          explosionParticles.push({
            x: cx + ox, y: cy + oy,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 2,
            life: 60 + Math.random() * 40,
            size: 2 + Math.random() * 5,
            color: Math.random() < 0.5 ? '#f42' : '#ff4'
          });
        }
      }
    }

    function spawnExplosion() {
      const cx = player.x + player.width / 2;
      const cy = player.y + player.height / 2;

      for (let i = 0; i < 40; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 6;
        explosionParticles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 2,
          life: 60 + Math.random() * 40,
          size: 2 + Math.random() * 5,
          color: Math.random() < 0.3 ? '#ff4' : Math.random() < 0.6 ? '#f42' : '#f80'
        });
      }
      for (let i = 0; i < 12; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 3;
        explosionParticles.push({
          x: cx + (Math.random() - 0.5) * 30,
          y: cy + (Math.random() - 0.5) * 15,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 3,
          life: 80 + Math.random() * 40,
          size: 4 + Math.random() * 6,
          color: Math.random() < 0.5 ? '#d44' : '#555'
        });
      }
    }

    function updateExplosion() {
      for (let i = explosionParticles.length - 1; i >= 0; i--) {
        const p = explosionParticles[i];
        p.x += p.vx * deltaTime;
        p.y += p.vy * deltaTime;
        p.vy += 0.08 * deltaTime;
        p.vx *= 0.98;
        p.life--;
        if (p.life <= 0) explosionParticles.splice(i, 1);
      }
    }

    function drawExplosion() {
      for (const p of explosionParticles) {
        const alpha = p.life / 100;
        ctx.globalAlpha = Math.min(alpha, 1);
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
      }
      ctx.globalAlpha = 1;
    }

    // ============================================================
    // SCREEN SHAKE
    // ============================================================
    function triggerShake(intensity, duration) {
      shakeIntensity = intensity;
      shakeDuration = duration;
    }

    function applyShake() {
      if (shakeDuration > 0) {
        const offsetX = (Math.random() - 0.5) * shakeIntensity * 2;
        const offsetY = (Math.random() - 0.5) * shakeIntensity * 2;
        ctx.translate(offsetX, offsetY);
        shakeDuration--;
        shakeIntensity *= 0.93;
      }
    }

    function resetShake() {
      ctx.setTransform(1, 0, 0, 1, 0, 0);
    }

    // ============================================================
    // COLLISION DETECTION (with lives system)
    // ============================================================
    const GOD_MODE = false;

    function loseLife() {
      if (GOD_MODE) {
        // Infinite lives — still show hit effects
        invincibleTimer = 90;
        triggerShake(4, 8);
        triggerGlitch(0.5, 8);
        sfxLifeLost();
        spawnSmallExplosion(player.x + player.width / 2, player.y + player.height / 2);
        return;
      }

      lives--;
      invincibleTimer = 120;
      triggerShake(8, 15);
      triggerGlitch(1, 15);

      if (lives <= 0) {
        gameState = 'dying';
        dyingTimer = 70;
        if (score > highScore) highScore = score;
        nameInput = '';
        nameSubmitted = false;
        showLeaderboard = false;
        spawnMassiveExplosion();
        spawnRoverDebris();
        sfxExplosion();
        triggerShake(20, 50);
        triggerGlitch(3, 40);
        hurtFlashTimer = 30;
        stopMusic();
      } else {
        sfxExplosion();
        // Massive explosion on every life lost
        spawnMassiveExplosion();
        spawnRoverDebris();
        triggerShake(18, 40);
        triggerGlitch(2.5, 30);
        hurtFlashTimer = 25;

        // Brief freeze to emphasize the hit
        hitPauseTimer = 45;

        // HURT text popup
        comboPopups.push({
          x: player.x + player.width / 2,
          y: player.y - 30,
          text: `HURT! ${lives} ${lives === 1 ? 'LIFE' : 'LIVES'} LEFT`,
          life: 120,
          color: '#f44'
        });

        // Flash screen red briefly
        hurtFlashTimer = 15;
      }
    }

    let hurtFlashTimer = 0;
    let dyingTimer = 0;
    let hitPauseTimer = 0;
    let lightPickupAnim = 0;
    let shieldPickupAnim = 0;

    // Power-up pickup screen effect
    let pickupEffects = [];
    function spawnPickupEffect(x, y, color1, color2, label) {
      pickupEffects.push({
        x, y, color1, color2, label,
        life: 50, maxLife: 50
      });
      // Burst particles around player
      for (let i = 0; i < 20; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 5;
        particles.push({
          x: x, y: y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 1,
          life: 30 + Math.random() * 20,
          size: 2 + Math.random() * 4,
          color: Math.random() < 0.5 ? color1 : color2
        });
      }
    }

    function updatePickupEffects() {
      for (let i = pickupEffects.length - 1; i >= 0; i--) {
        pickupEffects[i].life--;
        if (pickupEffects[i].life <= 0) pickupEffects.splice(i, 1);
      }
    }

    function drawPickupEffects() {
      for (const e of pickupEffects) {
        const t = 1 - e.life / e.maxLife; // 0 to 1
        const alpha = e.life / e.maxLife;

        // Expanding rings
        ctx.strokeStyle = `${e.color1}`;
        ctx.globalAlpha = alpha * 0.8;
        ctx.lineWidth = 3 - t * 2;
        ctx.beginPath();
        ctx.arc(e.x, e.y, 15 + t * 80, 0, Math.PI * 2);
        ctx.stroke();

        // Second ring (delayed)
        if (t > 0.15) {
          const t2 = (t - 0.15) / 0.85;
          ctx.globalAlpha = alpha * 0.5;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(e.x, e.y, 10 + t2 * 60, 0, Math.PI * 2);
          ctx.stroke();
        }

        // Flash glow at center
        if (t < 0.3) {
          const gAlpha = (0.3 - t) / 0.3 * 0.6;
          ctx.globalAlpha = gAlpha;
          ctx.fillStyle = e.color2;
          ctx.beginPath();
          ctx.arc(e.x, e.y, 30 - t * 50, 0, Math.PI * 2);
          ctx.fill();
        }

        // Big bold text floating up
        const textY = e.y - 25 - t * 40;
        const scale = t < 0.2 ? 0.5 + (t / 0.2) * 0.5 : 1;
        ctx.globalAlpha = alpha;
        ctx.save();
        ctx.translate(e.x, textY);
        ctx.scale(scale, scale);
        ctx.fillStyle = e.color1;
        ctx.font = 'bold 18px Courier New';
        ctx.textAlign = 'center';
        ctx.shadowColor = e.color1;
        ctx.shadowBlur = 15;
        ctx.fillText(e.label, 0, 0);
        ctx.shadowBlur = 0;
        ctx.restore();

        ctx.globalAlpha = 1;
      }
    }

    function drawHurtFlash() {
      if (hurtFlashTimer <= 0) return;
      hurtFlashTimer--;
      if (gameState === 'dying' || gameState === 'gameover') {
        // White flash that fades to red - massive death explosion feel
        const t = hurtFlashTimer / 30;
        if (t > 0.7) {
          const alpha = (t - 0.7) / 0.3 * 0.8;
          ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        } else {
          const alpha = t / 0.7 * 0.5;
          ctx.fillStyle = `rgba(255, 60, 0, ${alpha})`;
        }
      } else {
        const alpha = hurtFlashTimer / 15 * 0.35;
        ctx.fillStyle = `rgba(255, 0, 0, ${alpha})`;
      }
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function checkCollisions() {
      if (invincibleTimer > 0) return; // Can't be hit while invincible

      for (const obs of obstacles) {
        if (
          player.x < obs.x + obs.width &&
          player.x + player.width > obs.x &&
          player.y < obs.y + obs.height &&
          player.y + player.height > obs.y
        ) {
          if (player.hasShield) {
            player.hasShield = false;
            player.shieldTimer = 0;
            obstacles.splice(obstacles.indexOf(obs), 1);
            sfxShieldHit();
            triggerShake(4, 10);
            return;
          }
          obstacles.splice(obstacles.indexOf(obs), 1);
          loseLife();
          return;
        }
      }
    }

    // ============================================================
    // PLAYER UPDATE
    // ============================================================
    const PLAYER_MIN_X = 60;
    const PLAYER_MAX_X = 300;
    const PLAYER_MOVE_SPEED = 4;

    function updatePlayer() {
      // Left/right movement
      if (keys['ArrowLeft']) {
        player.x = Math.max(PLAYER_MIN_X, player.x - PLAYER_MOVE_SPEED);
      }
      if (keys['ArrowRight']) {
        player.x = Math.min(PLAYER_MAX_X, player.x + PLAYER_MOVE_SPEED);
      }

      const targetY = getLaneY(player.targetLane);

      if (!player.isJumping) {
        const diff = targetY - player.y;
        if (Math.abs(diff) > 2) {
          player.y += diff * 0.15;
        } else {
          player.y = targetY;
          player.lane = player.targetLane;
        }
      }

      if (player.isJumping) {
        player.vy += GRAVITY * deltaTime;
        player.y += player.vy * deltaTime;

        const landY = getLaneY(player.targetLane);
        if (player.y >= landY) {
          player.y = landY;
          player.vy = 0;
          player.isJumping = false;
          player.lane = player.targetLane;
          jumpCount = 0;
          spawnDustParticles();
          sfxLand();
        }
      }

      if (player.lightTimer > 0) {
        player.lightTimer--;
        if (player.lightTimer <= 0) player.lightRadius = BASE_LIGHT_RADIUS;
      }

      if (player.shieldTimer > 0) {
        player.shieldTimer--;
        if (player.shieldTimer <= 0) player.hasShield = false;
      }

      // Invincibility timer (after losing a life)
      if (invincibleTimer > 0) invincibleTimer--;

      // Rover tilt animation based on lane switching
      const targetTilt = player.targetLane === 'upper' && player.lane === 'ground' ? -0.15
        : player.targetLane === 'ground' && player.lane === 'upper' ? 0.15
        : player.isJumping ? -0.08 : 0;
      roverTilt += (targetTilt - roverTilt) * 0.12;

      // Zone is now handled by level system (no score-based zone transitions)
      if (zoneAnnouncementTimer > 0) zoneAnnouncementTimer--;

      player.wheelAngle += 0.15 * difficulty;
    }

    // ============================================================
    // DRAW PLAYER
    // ============================================================
    function updateTrail() {
      // Spawn trail particle behind rover
      if (frameCount % 2 === 0) {
        trailParticles.push({
          x: player.x - 2,
          y: player.y + player.height - 4 + (Math.random() - 0.5) * 6,
          life: 20 + Math.random() * 10,
          size: 2 + Math.random() * 2
        });
      }
      for (let i = trailParticles.length - 1; i >= 0; i--) {
        trailParticles[i].x -= SCROLL_SPEED * difficulty * 0.5 * deltaTime;
        trailParticles[i].life--;
        if (trailParticles[i].life <= 0) trailParticles.splice(i, 1);
      }
    }

    function drawTrail() {
      for (const t of trailParticles) {
        const alpha = t.life / 30;
        ctx.fillStyle = `rgba(255, 120, 40, ${alpha * 0.4})`;
        ctx.fillRect(t.x, t.y, t.size, t.size);
      }
    }

    function drawPlayer() {
      // Blink when invincible (flash every 6 frames, semi-transparent)
      if (invincibleTimer > 0) {
        if (Math.floor(frameCount / 6) % 2 === 0) return;
        ctx.globalAlpha = 0.6;
      }

      const px = player.x;
      const py = player.y;

      // Rover shadow
      ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
      ctx.beginPath();
      const shadowY = player.lane === 'upper' ? PLATFORM_Y : GROUND_Y;
      ctx.ellipse(px + ROVER_WIDTH / 2, shadowY - 1, ROVER_WIDTH / 2 + 4, 4, 0, 0, Math.PI * 2);
      ctx.fill();

      // Apply rover tilt
      ctx.save();
      ctx.translate(px + ROVER_WIDTH / 2, py + ROVER_HEIGHT / 2);
      ctx.rotate(roverTilt);
      ctx.translate(-(px + ROVER_WIDTH / 2), -(py + ROVER_HEIGHT / 2));

      // --- EXHAUST FLAMES ---
      const flameFlicker = Math.random() * 8;
      const flameLength = 12 + Math.random() * 8 + difficulty * 3;

      ctx.fillStyle = `rgba(255, ${100 + Math.random() * 50}, 0, 0.8)`;
      ctx.beginPath();
      ctx.moveTo(px + 2, py + 8);
      ctx.lineTo(px - flameLength, py + ROVER_HEIGHT / 2 + flameFlicker - 4);
      ctx.lineTo(px + 2, py + ROVER_HEIGHT - 10);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = `rgba(255, 255, ${50 + Math.random() * 100}, 0.9)`;
      ctx.beginPath();
      ctx.moveTo(px + 4, py + 12);
      ctx.lineTo(px - flameLength * 0.5, py + ROVER_HEIGHT / 2 + flameFlicker * 0.5 - 2);
      ctx.lineTo(px + 4, py + ROVER_HEIGHT - 14);
      ctx.closePath();
      ctx.fill();

      // --- HEADLIGHT BEAM ---
      const beamGradient = ctx.createLinearGradient(
        px + ROVER_WIDTH, py + 5,
        px + ROVER_WIDTH + 80, py + 5
      );
      beamGradient.addColorStop(0, 'rgba(255, 255, 200, 0.25)');
      beamGradient.addColorStop(1, 'rgba(255, 255, 200, 0)');
      ctx.fillStyle = beamGradient;
      ctx.beginPath();
      ctx.moveTo(px + ROVER_WIDTH - 2, py + 2);
      ctx.lineTo(px + ROVER_WIDTH + 80, py - 15);
      ctx.lineTo(px + ROVER_WIDTH + 80, py + ROVER_HEIGHT + 10);
      ctx.lineTo(px + ROVER_WIDTH - 2, py + ROVER_HEIGHT - 5);
      ctx.closePath();
      ctx.fill();

      // --- ROVER BODY ---
      ctx.fillStyle = '#d44';
      ctx.fillRect(px + 5, py + 2, ROVER_WIDTH - 10, ROVER_HEIGHT - 10);

      // Cabin
      ctx.fillStyle = '#e66';
      ctx.fillRect(px + 15, py - 8, 25, 12);

      // Windshield
      ctx.fillStyle = '#adf';
      ctx.fillRect(px + 35, py - 6, 8, 8);

      // Headlight dot
      ctx.fillStyle = '#ffa';
      ctx.fillRect(px + ROVER_WIDTH - 6, py + 3, 4, 4);

      // Laser turret on top (small)
      ctx.fillStyle = '#999';
      ctx.fillRect(px + 28, py - 12, 6, 4);
      ctx.fillStyle = cb('#0f8', '#4af');
      ctx.fillRect(px + 34, py - 11, 3, 2);

      // Antenna
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(px + 20, py - 8);
      ctx.lineTo(px + 16, py - 20);
      ctx.stroke();

      const blinkerAlpha = Math.sin(frameCount * 0.15) * 0.5 + 0.5;
      ctx.fillStyle = `rgba(255, 0, 0, ${blinkerAlpha})`;
      ctx.beginPath();
      ctx.arc(px + 16, py - 20, 2, 0, Math.PI * 2);
      ctx.fill();

      // Wheels
      const wheel1X = px + 14;
      const wheel2X = px + ROVER_WIDTH - 14;
      const wheelY = py + ROVER_HEIGHT - 6;

      for (const wx of [wheel1X, wheel2X]) {
        ctx.beginPath();
        ctx.arc(wx, wheelY, WHEEL_RADIUS, 0, Math.PI * 2);
        ctx.fillStyle = '#333';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(wx, wheelY, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#888';
        ctx.fill();
        ctx.strokeStyle = '#666';
        ctx.lineWidth = 1;
        for (let a = 0; a < 4; a++) {
          const angle = player.wheelAngle + (a * Math.PI / 2);
          ctx.beginPath();
          ctx.moveTo(wx, wheelY);
          ctx.lineTo(wx + Math.cos(angle) * WHEEL_RADIUS, wheelY + Math.sin(angle) * WHEEL_RADIUS);
          ctx.stroke();
        }
      }

      // Shield bubble
      if (player.hasShield) {
        const shieldPulse = Math.sin(frameCount * 0.1) * 0.15 + 0.35;
        ctx.beginPath();
        ctx.arc(px + ROVER_WIDTH / 2, py + ROVER_HEIGHT / 2, 45, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(80, 130, 255, ${shieldPulse})`;
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(px + ROVER_WIDTH / 2, py + ROVER_HEIGHT / 2, 42, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(120, 170, 255, ${shieldPulse * 0.5})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      ctx.restore(); // Restore from tilt transform
      ctx.globalAlpha = 1;
    }

    // ============================================================
    // BOSS SYSTEM
    // ============================================================
    function spawnBoss() {
      const bossHP = 5 + currentLevel * 3; // Lv1=8, Lv2=11, Lv3=14, Lv7=26
      boss = {
        x: canvas.width + 60,
        y: 80,
        width: 90,
        height: 45,
        hp: bossHP,
        maxHp: bossHP,
        phase: 0,
        phaseTimer: 0,
        shootTimer: 0,
        enterDone: false,
        flashTimer: 0,
        bobPhase: 0
      };
      bossActive = true;
      bossDefeated = false;

      // Clear upper lane obstacles so boss area is open
      for (let i = obstacles.length - 1; i >= 0; i--) {
        if (obstacles[i].lane === 'upper') obstacles.splice(i, 1);
      }

      // Announce boss
      zoneAnnouncement = `BOSS - LEVEL ${currentLevel}`;
      zoneAnnouncementTimer = 180;
      sfxZoneChange();
    }

    function updateBoss() {
      if (!boss || !bossActive) return;

      boss.bobPhase += 0.03;

      // Enter animation — fly in and park in front of player
      if (!boss.enterDone) {
        boss.x -= 4;
        if (boss.x <= 420) {
          boss.enterDone = true;
        }
        return;
      }

      // Boss stays in place with gentle bob — easy to hit!
      const homeX = 420;
      const homeY = player.y - 40; // Hover above player's lane
      boss.x += (homeX - boss.x) * 0.05;
      boss.y += (homeY - boss.y) * 0.03;
      // Small gentle bob only
      boss.y += Math.sin(boss.bobPhase) * 0.5;

      // Keep in bounds
      boss.x = Math.max(350, Math.min(boss.x, canvas.width - 50));
      boss.y = Math.max(50, Math.min(boss.y, PLATFORM_Y - 40));

      if (boss.flashTimer > 0) boss.flashTimer--;

      // Boss shooting
      const shootRate = Math.max(30, 120 - currentLevel * 12); // Lv1=108, Lv4=72, Lv7=36
      boss.shootTimer--;
      if (boss.shootTimer <= 0) {
        boss.shootTimer = shootRate;
        // Aimed bullet
        const angle = Math.atan2(
          (player.y + player.height / 2) - (boss.y + boss.height / 2),
          (player.x + player.width / 2) - (boss.x)
        );
        const bSpeed = Math.min(2.5 + currentLevel * 0.3, 5); // Scales with level
        enemyBullets.push({
          x: boss.x,
          y: boss.y + boss.height / 2,
          vx: Math.cos(angle) * bSpeed,
          vy: Math.sin(angle) * bSpeed,
          size: 5
        });
        sfxEnemyShoot();

        // Spread shots at higher levels (level 3+), more spread at higher levels
        if (currentLevel >= 3) {
          const spreadAngle = 0.15 + currentLevel * 0.02;
          enemyBullets.push({
            x: boss.x,
            y: boss.y + boss.height / 2,
            vx: Math.cos(angle + spreadAngle) * (bSpeed * 0.9),
            vy: Math.sin(angle + spreadAngle) * (bSpeed * 0.9),
            size: 4
          });
          enemyBullets.push({
            x: boss.x,
            y: boss.y + boss.height / 2,
            vx: Math.cos(angle - spreadAngle) * (bSpeed * 0.9),
            vy: Math.sin(angle - spreadAngle) * (bSpeed * 0.9),
            size: 4
          });

          // Extra wide spread at level 5+
          if (currentLevel >= 5) {
            const wideAngle = spreadAngle * 2;
            enemyBullets.push({
              x: boss.x,
              y: boss.y + boss.height / 2,
              vx: Math.cos(angle + wideAngle) * (bSpeed * 0.8),
              vy: Math.sin(angle + wideAngle) * (bSpeed * 0.8),
              size: 3
            });
            enemyBullets.push({
              x: boss.x,
              y: boss.y + boss.height / 2,
              vx: Math.cos(angle - wideAngle) * (bSpeed * 0.8),
              vy: Math.sin(angle - wideAngle) * (bSpeed * 0.8),
              size: 3
            });
          }
        }
      }

      // Check laser hits on boss
      for (let j = lasers.length - 1; j >= 0; j--) {
        const l = lasers[j];
        if (
          l.x < boss.x + boss.width &&
          l.x + l.width > boss.x &&
          l.y < boss.y + boss.height &&
          l.y + l.height > boss.y
        ) {
          lasers.splice(j, 1);
          boss.hp--;
          boss.flashTimer = 8;
          sfxShieldHit();
          triggerShake(3, 5);

          if (boss.hp <= 0) {
            // Boss defeated!
            score += 1000 * currentLevel;
            bossActive = false;
            bossDefeated = true;

            // Big explosion
            for (let k = 0; k < 5; k++) {
              setTimeout(() => {
                spawnSmallExplosion(
                  boss.x + Math.random() * boss.width,
                  boss.y + Math.random() * boss.height
                );
              }, k * 100);
            }
            sfxExplosion();
            triggerShake(10, 25);

            comboPopups.push({
              x: boss.x + boss.width / 2,
              y: boss.y - 20,
              text: `+${1000 * currentLevel} BOSS DOWN!`,
              life: 120,
              color: '#fc0'
            });

            ufosDestroyed += 3; // Boss counts as 3 UFOs

            // Start level transition
            levelComplete = true;
            levelTransitionTimer = 180;
            zoneAnnouncement = `LEVEL ${currentLevel} COMPLETE!`;
            zoneAnnouncementTimer = 180;
            sfxZoneChange();

            // Restore a life (up to max)
            if (lives < MAX_LIVES) {
              lives++;
              comboPopups.push({
                x: canvas.width / 2, y: canvas.height / 2 + 30,
                text: '+1 LIFE!',
                life: 120, color: '#0f0'
              });
            }
          }
          break;
        }
      }
    }

    function drawBoss() {
      if (!boss || !bossActive) return;

      const bx = boss.x;
      const by = boss.y;
      const isFlashing = boss.flashTimer > 0;

      // Boss glow/aura
      const auraPulse = Math.sin(frameCount * 0.08) * 0.15 + 0.2;
      ctx.fillStyle = cb(`rgba(255, 50, 50, ${auraPulse})`, `rgba(255, 140, 0, ${auraPulse})`);
      ctx.beginPath();
      ctx.ellipse(bx + boss.width / 2, by + boss.height / 2, boss.width / 2 + 15, boss.height / 2 + 15, 0, 0, Math.PI * 2);
      ctx.fill();

      // Main body (large saucer)
      ctx.fillStyle = isFlashing ? '#fff' : cb('#c44', '#c70');
      ctx.beginPath();
      ctx.ellipse(bx + boss.width / 2, by + boss.height / 2, boss.width / 2, boss.height / 3, 0, 0, Math.PI * 2);
      ctx.fill();

      // Upper dome
      ctx.fillStyle = isFlashing ? '#ffa' : cb('#e66', '#e90');
      ctx.beginPath();
      ctx.ellipse(bx + boss.width / 2, by + 8, 25, 16, 0, Math.PI, 0);
      ctx.fill();

      // Menacing eye
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(bx + boss.width / 2, by + 12, 8, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      const eyeGlow = Math.sin(frameCount * 0.1) * 0.3 + 0.7;
      ctx.fillStyle = cb(`rgba(255, 0, 0, ${eyeGlow})`, `rgba(255, 140, 0, ${eyeGlow})`);
      ctx.beginPath();
      ctx.arc(bx + boss.width / 2, by + 12, 3, 0, Math.PI * 2);
      ctx.fill();

      // Bottom details
      ctx.fillStyle = isFlashing ? '#ffa' : cb('#a33', '#a60');
      ctx.fillRect(bx + 15, by + boss.height - 8, boss.width - 30, 4);

      // Rotating lights
      for (let k = 0; k < 5; k++) {
        const lAngle = frameCount * 0.08 + k * (Math.PI * 2 / 5);
        const lx = bx + boss.width / 2 + Math.cos(lAngle) * (boss.width / 2 - 8);
        const ly = by + boss.height / 2 + Math.sin(lAngle) * (boss.height / 3 - 4);
        ctx.fillStyle = `rgba(255, ${150 + Math.sin(lAngle) * 100}, 0, 0.8)`;
        ctx.beginPath();
        ctx.arc(lx, ly, 3, 0, Math.PI * 2);
        ctx.fill();
      }

      // Health bar
      const hbW = 80;
      const hbH = 6;
      const hbX = bx + boss.width / 2 - hbW / 2;
      const hbY = by - 18;
      ctx.fillStyle = '#333';
      ctx.fillRect(hbX, hbY, hbW, hbH);
      const hpRatio = boss.hp / boss.maxHp;
      ctx.fillStyle = hpRatio > 0.5 ? cb('#0f0', '#4af') : hpRatio > 0.25 ? '#ff0' : cb('#f00', '#f80');
      ctx.fillRect(hbX, hbY, hbW * hpRatio, hbH);
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 1;
      ctx.strokeRect(hbX, hbY, hbW, hbH);

      // Boss label
      ctx.fillStyle = cb('#f88', '#fa8');
      ctx.font = 'bold 10px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText(`LV${currentLevel} BOSS`, bx + boss.width / 2, hbY - 4);
    }

    // ============================================================
    // SCREEN GLITCH EFFECT (chromatic aberration on damage)
    // ============================================================
    function triggerGlitch(intensity, duration) {
      glitchIntensity = intensity;
      glitchTimer = duration;
    }

    function drawGlitch() {
      if (glitchTimer <= 0) return;
      glitchTimer--;

      const intensity = glitchIntensity * (glitchTimer / 15);

      // RGB channel split
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

      // Red channel shift
      ctx.globalCompositeOperation = 'screen';
      ctx.globalAlpha = 0.3 * intensity;
      ctx.drawImage(canvas, -3 * intensity, -1 * intensity);
      ctx.globalAlpha = 0.2 * intensity;
      ctx.drawImage(canvas, 3 * intensity, 1 * intensity);
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1;

      // Random scan line displacement
      if (Math.random() < 0.5) {
        const sliceY = Math.random() * canvas.height;
        const sliceH = 2 + Math.random() * 8;
        const shift = (Math.random() - 0.5) * 20 * intensity;
        ctx.drawImage(canvas, 0, sliceY, canvas.width, sliceH, shift, sliceY, canvas.width, sliceH);
      }

      // Static noise
      ctx.fillStyle = `rgba(255, 255, 255, ${0.03 * intensity})`;
      for (let i = 0; i < 20; i++) {
        const nx = Math.random() * canvas.width;
        const ny = Math.random() * canvas.height;
        ctx.fillRect(nx, ny, Math.random() * 30, 1);
      }
    }

    // ============================================================
    // MINIMAP
    // ============================================================
    function drawMinimap() {
      const mmX = canvas.width / 2 - 100;
      const mmY = canvas.height - 18;
      const mmW = 200;
      const mmH = 10;
      const scale = mmW / (canvas.width + 300); // Map range

      // Background
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.fillRect(mmX - 1, mmY - 1, mmW + 2, mmH + 2);
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 1;
      ctx.strokeRect(mmX - 1, mmY - 1, mmW + 2, mmH + 2);

      // Player dot
      const playerDot = mmX + player.x * scale;
      ctx.fillStyle = cb('#0f0', '#4af');
      ctx.fillRect(playerDot - 1, mmY + 1, 3, mmH - 2);

      // Obstacles
      for (const obs of obstacles) {
        const ox = mmX + obs.x * scale;
        if (ox >= mmX && ox <= mmX + mmW) {
          ctx.fillStyle = obs.lane === player.lane ? cb('#f44', '#f80') : '#864';
          ctx.fillRect(ox, mmY + 2, 2, mmH - 4);
        }
      }

      // UFOs
      for (const ufo of ufos) {
        const ux = mmX + ufo.x * scale;
        if (ux >= mmX && ux <= mmX + mmW) {
          ctx.fillStyle = '#c6f';
          ctx.fillRect(ux, mmY + 1, 3, 3);
        }
      }

      // Boss
      if (boss && bossActive) {
        const bossX = mmX + boss.x * scale;
        if (bossX >= mmX && bossX <= mmX + mmW) {
          ctx.fillStyle = cb('#f00', '#f80');
          ctx.fillRect(bossX - 1, mmY, 5, mmH);
        }
      }

      // Terrain gaps
      for (const seg of terrainSegments) {
        if (seg.isGap) {
          const gx = mmX + seg.x * scale;
          if (gx >= mmX && gx <= mmX + mmW) {
            ctx.fillStyle = '#f80';
            ctx.fillRect(gx, mmY + mmH - 3, 2, 3);
          }
        }
      }

      // Power-ups
      for (const p of powerups) {
        const px = mmX + p.x * scale;
        if (px >= mmX && px <= mmX + mmW) {
          ctx.fillStyle = p.type === 'flashlight' ? '#ff0' : '#48f';
          ctx.fillRect(px, mmY + 2, 2, 2);
        }
      }
    }

    // ============================================================
    // ROVER DEBRIS (animated game over)
    // ============================================================
    function spawnRoverDebris() {
      const cx = player.x + player.width / 2;
      const cy = player.y + player.height / 2;
      const colors = ['#d44', '#e66', '#adf', '#999', '#333', '#ffa', '#d44'];
      const parts = [
        { w: 20, h: 10, label: 'body' },
        { w: 12, h: 8, label: 'cabin' },
        { w: 8, h: 8, label: 'wheel' },
        { w: 8, h: 8, label: 'wheel' },
        { w: 6, h: 4, label: 'turret' },
        { w: 4, h: 12, label: 'antenna' },
        { w: 10, h: 6, label: 'panel' },
        { w: 8, h: 5, label: 'windshield' },
      ];

      for (let i = 0; i < parts.length; i++) {
        const angle = (i / parts.length) * Math.PI * 2 + Math.random() * 0.5;
        const speed = 4 + Math.random() * 8;
        roverDebris.push({
          x: cx + (Math.random() - 0.5) * 20,
          y: cy + (Math.random() - 0.5) * 10,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 6,
          w: parts[i].w,
          h: parts[i].h,
          rotation: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.5,
          color: colors[i % colors.length],
          life: 160 + Math.random() * 80
        });
      }
      // Extra small shrapnel pieces
      for (let i = 0; i < 12; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 3 + Math.random() * 10;
        roverDebris.push({
          x: cx + (Math.random() - 0.5) * 30,
          y: cy + (Math.random() - 0.5) * 15,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 5,
          w: 2 + Math.random() * 5,
          h: 2 + Math.random() * 4,
          rotation: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.8,
          color: Math.random() < 0.5 ? '#f80' : '#999',
          life: 100 + Math.random() * 80
        });
      }
    }

    function updateRoverDebris() {
      for (let i = roverDebris.length - 1; i >= 0; i--) {
        const d = roverDebris[i];
        d.x += d.vx * deltaTime;
        d.y += d.vy * deltaTime;
        d.vy += 0.1 * deltaTime;
        d.vx *= 0.99;
        d.rotation += d.rotSpeed;
        d.life--;
        if (d.life <= 0) roverDebris.splice(i, 1);
      }
    }

    function drawRoverDebris() {
      for (const d of roverDebris) {
        const alpha = Math.min(d.life / 60, 1);
        ctx.save();
        ctx.translate(d.x, d.y);
        ctx.rotate(d.rotation);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = d.color;
        ctx.fillRect(-d.w / 2, -d.h / 2, d.w, d.h);
        ctx.globalAlpha = 1;
        ctx.restore();
      }
    }

    // ============================================================
    // LEVEL SYSTEM
    // ============================================================
    function getLevelZone(level) {
      const zones = ['moon', 'mars', 'asteroid', 'jupiter', 'europa', 'titan', 'pluto'];
      if (level <= zones.length) return zones[level - 1];
      return zones[(level - 1) % zones.length]; // Cycle after all planets
    }

    function updateLevelSystem() {
      if (levelComplete) {
        levelTransitionTimer--;
        if (levelTransitionTimer <= 0) {
          // Advance to next level
          currentLevel++;
          levelDistance = 0;
          levelComplete = false;
          bossActive = false;
          bossDefeated = false;
          boss = null;

          // Update zone based on level
          const newZone = getLevelZone(currentLevel);
          if (newZone !== currentZone) {
            currentZone = newZone;
            const themeColors = getThemeColors(newZone);
            zoneAnnouncement = `LEVEL ${currentLevel} - ${themeColors.name}`;
            zoneAnnouncementTimer = 180;
            sfxZoneChange();
          } else {
            zoneAnnouncement = `LEVEL ${currentLevel}`;
            zoneAnnouncementTimer = 150;
          }

          // Clear threats for fresh start
          enemyBullets.length = 0;
        }
        return;
      }

      // Track level distance
      levelDistance += SCROLL_SPEED * difficulty;

      // Spawn boss when level distance reached and no boss yet
      if (levelDistance >= LEVEL_LENGTH && !bossActive && !bossDefeated) {
        spawnBoss();
      }
    }

    // ============================================================
    // DARKNESS RENDERING
    // ============================================================
    function drawDarkness() {
      const centerX = player.x + player.width / 2;
      const centerY = player.y + player.height / 2;
      // Expand light massively during boss fights so player can see the boss
      const radius = bossActive ? Math.max(player.lightRadius, 500) : player.lightRadius;

      const gradient = ctx.createRadialGradient(
        centerX, centerY, radius * 0.3,
        centerX, centerY, radius
      );
      gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
      gradient.addColorStop(0.5, 'rgba(0, 0, 0, 0.15)');
      gradient.addColorStop(0.75, 'rgba(0, 0, 0, 0.5)');
      gradient.addColorStop(1, 'rgba(0, 0, 0, 0.9)');

      ctx.save();
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
      if (centerX - radius > 0) ctx.fillRect(0, 0, centerX - radius, canvas.height);
      if (centerX + radius < canvas.width)
        ctx.fillRect(centerX + radius, 0, canvas.width - (centerX + radius), canvas.height);
      ctx.restore();
    }

    // ============================================================
    // HUD
    // ============================================================
    function drawHUD() {
      ctx.fillStyle = '#fff';
      ctx.font = '18px Courier New';
      ctx.textAlign = 'left';
      ctx.fillText(`SCORE: ${score}`, 20, 30);
      ctx.fillText(`HIGH: ${highScore}`, 20, 55);

      ctx.fillStyle = '#aaa';
      ctx.font = '14px Courier New';
      const laneText = player.lane === 'upper' ? 'LANE: UPPER' : 'LANE: GROUND';
      ctx.fillText(laneText, canvas.width - 160, 30);

      const theme = getCurrentTheme();
      const themeColors = getThemeColors(theme);
      const zoneColors = { moon: '#668', mars: '#a64', asteroid: '#86a', jupiter: '#a84', europa: '#6ac', titan: '#a90', pluto: '#88a' };
      ctx.fillStyle = zoneColors[theme] || '#888';
      ctx.fillText(`LV${currentLevel} ${themeColors.name}`, canvas.width - 160, 50);

      // Level progress bar
      const lpX = canvas.width - 160;
      const lpW = 140;
      const lpProgress = Math.min(levelDistance / LEVEL_LENGTH, 1);
      ctx.fillStyle = '#222';
      ctx.fillRect(lpX, 55, lpW, 4);
      ctx.fillStyle = bossActive ? cb('#f44', '#f80') : levelComplete ? cb('#0f0', '#4af') : '#48f';
      ctx.fillRect(lpX, 55, lpW * lpProgress, 4);
      if (bossActive || lpProgress >= 1) {
        ctx.fillStyle = '#fff';
        ctx.font = '8px Courier New';
        ctx.textAlign = 'right';
        ctx.fillText(bossActive ? 'BOSS!' : 'CLEAR!', canvas.width - 20, 53);
      }

      // Active power-ups panel (right side)
      const puX = canvas.width - 55;
      let puY = 110;
      if (lightPickupAnim > 0) lightPickupAnim--;
      if (shieldPickupAnim > 0) shieldPickupAnim--;

      if (player.lightTimer > 0 || player.hasShield) {
        // Panel background
        ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
        const panelH = (player.lightTimer > 0 && player.hasShield) ? 90 : 48;
        ctx.fillRect(puX - 8, puY - 12, 58, panelH);
        ctx.strokeStyle = '#444';
        ctx.lineWidth = 1;
        ctx.strokeRect(puX - 8, puY - 12, 58, panelH);
      }

      if (player.lightTimer > 0) {
        const lAnim = lightPickupAnim / 30;
        const lScale = lAnim > 0 ? 1 + lAnim * 1.2 : 1;
        const lGlow = lAnim > 0 ? lAnim : 0;

        ctx.save();
        ctx.translate(puX + 10, puY + 2);
        ctx.scale(lScale, lScale);

        // Pickup burst ring
        if (lGlow > 0) {
          ctx.strokeStyle = `rgba(255, 255, 80, ${lGlow * 0.8})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(0, 0, 14 + (1 - lGlow) * 20, 0, Math.PI * 2);
          ctx.stroke();
        }

        // Light power-up icon (glowing circle)
        const lPulse = Math.sin(frameCount * 0.1) * 0.3 + 0.7;
        ctx.fillStyle = `rgba(255, 255, 50, ${Math.min(lPulse * 0.3 + lGlow * 0.5, 1)})`;
        ctx.beginPath();
        ctx.arc(0, 0, 14, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = `rgba(255, 255, 50, ${Math.min(lPulse + lGlow * 0.5, 1)})`;
        ctx.beginPath();
        ctx.arc(0, 0, 9, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.font = 'bold 10px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('L', 0, 4);
        ctx.restore();

        // Timer bar
        const ltRatio = player.lightTimer / 300;
        ctx.fillStyle = '#333';
        ctx.fillRect(puX - 4, puY + 18, 40, 4);
        ctx.fillStyle = '#ff0';
        ctx.fillRect(puX - 4, puY + 18, 40 * ltRatio, 4);

        ctx.fillStyle = '#ff0';
        ctx.font = '9px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText(`${Math.ceil(player.lightTimer / 60)}s`, puX + 10, puY + 32);

        puY += 45;
      }

      if (player.hasShield) {
        const sAnim = shieldPickupAnim / 30;
        const sScale = sAnim > 0 ? 1 + sAnim * 1.2 : 1;
        const sGlow = sAnim > 0 ? sAnim : 0;

        ctx.save();
        ctx.translate(puX + 10, puY + 2);
        ctx.scale(sScale, sScale);

        // Pickup burst ring
        if (sGlow > 0) {
          ctx.strokeStyle = `rgba(80, 130, 255, ${sGlow * 0.8})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(0, 0, 12 + (1 - sGlow) * 20, 0, Math.PI * 2);
          ctx.stroke();
        }

        // Shield power-up icon (bubble)
        const sPulse = Math.sin(frameCount * 0.08) * 0.3 + 0.7;
        ctx.strokeStyle = `rgba(80, 130, 255, ${Math.min(sPulse + sGlow * 0.5, 1)})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, 12, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = `rgba(80, 130, 255, ${Math.min(sPulse * 0.2 + sGlow * 0.4, 1)})`;
        ctx.beginPath();
        ctx.arc(0, 0, 12, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('S', 0, 4);
        ctx.restore();

        // Timer bar
        const stRatio = player.shieldTimer / 600;
        ctx.fillStyle = '#333';
        ctx.fillRect(puX - 4, puY + 18, 40, 4);
        ctx.fillStyle = '#48f';
        ctx.fillRect(puX - 4, puY + 18, 40 * stRatio, 4);

        ctx.fillStyle = '#48f';
        ctx.font = '9px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText(`${Math.ceil(player.shieldTimer / 60)}s`, puX + 10, puY + 32);
      }

      // Combo display
      if (comboCount > 0 && comboTimer > 0) {
        ctx.fillStyle = comboCount > 3 ? '#ff0' : cb('#0f0', '#4af');
        ctx.font = 'bold 16px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText(`COMBO x${comboCount}`, canvas.width / 2, 30);
        const barWidth = 100;
        const barFill = (comboTimer / 120) * barWidth;
        ctx.fillStyle = '#333';
        ctx.fillRect(canvas.width / 2 - barWidth / 2, 36, barWidth, 4);
        ctx.fillStyle = comboCount > 3 ? '#ff0' : cb('#0f0', '#4af');
        ctx.fillRect(canvas.width / 2 - barWidth / 2, 36, barFill, 4);
      }

      ctx.fillStyle = '#888';
      ctx.font = '12px Courier New';
      ctx.textAlign = 'left';
      ctx.fillText(`SPEED: x${difficulty.toFixed(1)}`, 20, 75);

      // Distance meter
      const distKm = (distanceTraveled / 1000).toFixed(1);
      ctx.fillStyle = '#8cf';
      ctx.fillText(`DIST: ${distKm} KM`, 20, 92);

      // Shoot hint
      ctx.fillStyle = '#555';
      ctx.fillText('Z/X: SHOOT  P: PAUSE  C: CB', 20, 109);

      // Colorblind mode indicator
      if (colorblindMode) {
        ctx.fillStyle = '#f80';
        ctx.fillText('CB: ON', canvas.width - 160, 110);
      }

      // Double jump indicator
      if (currentLevel >= 3) {
        ctx.fillStyle = '#8cf';
        ctx.fillText('DOUBLE JUMP: ON', 20, 145);
      }

      // Lives display (hearts)
      ctx.font = '16px Courier New';
      ctx.textAlign = 'left';
      for (let i = 0; i < MAX_LIVES; i++) {
        if (i < lives) {
          ctx.fillStyle = cb('#f44', '#f80');
          ctx.fillText('\u2665', 20 + i * 22, 128); // Filled heart
        } else {
          ctx.fillStyle = '#444';
          ctx.fillText('\u2665', 20 + i * 22, 128); // Empty heart
        }
      }

      // Zone transition announcement (big dramatic text)
      if (zoneAnnouncementTimer > 0) {
        const progress = zoneAnnouncementTimer / 180;
        const scale = progress > 0.8 ? (1 - progress) * 5 : progress > 0.2 ? 1 : progress * 5;
        const alpha = Math.min(scale, 1);

        ctx.globalAlpha = alpha;
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 32px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText(zoneAnnouncement, canvas.width / 2, canvas.height / 2 - 30);

        // Decorative lines
        const lineWidth = 200 * alpha;
        const announcColors = { moon: '#48f', mars: '#f44', asteroid: '#a6f', jupiter: '#f80', europa: '#4cf', titan: '#fa0', pluto: '#aaf' };
        ctx.strokeStyle = announcColors[currentZone] || '#48f';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2 - lineWidth, canvas.height / 2 - 10);
        ctx.lineTo(canvas.width / 2 + lineWidth, canvas.height / 2 - 10);
        ctx.stroke();

        ctx.globalAlpha = 1;
      }
    }

    function drawGameOverScreen() {
      stopMusic();
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (showLeaderboard) {
        // Show leaderboard overlay
        ctx.fillStyle = '#ff0';
        ctx.font = 'bold 28px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('LEADERBOARD', canvas.width / 2, 60);

        const lb = getLeaderboard();
        ctx.font = '14px Courier New';
        for (let i = 0; i < Math.min(lb.length, 10); i++) {
          const entry = lb[i];
          const isCurrentScore = !nameSubmitted ? false : (entry.score === score && entry.name === nameInput);
          ctx.fillStyle = isCurrentScore ? '#ff0' : (i < 3 ? '#fc0' : '#aaa');
          ctx.fillText(`${(i + 1).toString().padStart(2, ' ')}. ${entry.name.padEnd(8, ' ')}  ${entry.score.toString().padStart(6, ' ')}  ${entry.date}`, canvas.width / 2, 95 + i * 24);
        }
        if (lb.length === 0) {
          ctx.fillStyle = '#666';
          ctx.fillText('No scores yet!', canvas.width / 2, 120);
        }

        ctx.fillStyle = '#888';
        ctx.font = '13px Courier New';
        ctx.fillText(isMobile ? 'Tap to continue' : 'Press TAB to go back', canvas.width / 2, 360);

        const blink = Math.sin(frameCount * 0.05) > 0;
        if (blink && nameSubmitted) {
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 16px Courier New';
          ctx.fillText(isMobile ? 'TAP TO PLAY AGAIN' : 'PRESS ENTER TO PLAY AGAIN', canvas.width / 2, 400);
        }
        return;
      }

      ctx.fillStyle = '#f44';
      ctx.font = 'bold 48px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', canvas.width / 2, 100);

      ctx.fillStyle = '#fff';
      ctx.font = '24px Courier New';
      ctx.fillText(`SCORE: ${score}`, canvas.width / 2, 150);

      const themeColors = getThemeColors(getCurrentTheme());
      ctx.fillStyle = '#aaa';
      ctx.font = '14px Courier New';
      ctx.fillText(`Level ${currentLevel} - ${themeColors.name}  |  ${(distanceTraveled / 1000).toFixed(1)} KM`, canvas.width / 2, 180);

      // Kill stats
      ctx.fillStyle = '#f80';
      ctx.font = '14px Courier New';
      ctx.fillText(`UFOs destroyed: ${ufosDestroyed}  |  Rocks blasted: ${rocksDestroyed}`, canvas.width / 2, 205);

      if (score >= highScore && score > 0) {
        ctx.fillStyle = '#ff0';
        ctx.font = 'bold 18px Courier New';
        ctx.fillText('NEW HIGH SCORE!', canvas.width / 2, 235);
      }

      // Name entry
      if (!nameSubmitted) {
        ctx.fillStyle = '#8cf';
        ctx.font = '16px Courier New';
        ctx.fillText('ENTER YOUR NAME:', canvas.width / 2, 280);

        ctx.fillStyle = '#222';
        ctx.fillRect(canvas.width / 2 - 80, 290, 160, 30);
        ctx.strokeStyle = '#8cf';
        ctx.lineWidth = 2;
        ctx.strokeRect(canvas.width / 2 - 80, 290, 160, 30);

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 18px Courier New';
        const cursor = Math.sin(frameCount * 0.1) > 0 ? '_' : '';
        ctx.fillText(nameInput + cursor, canvas.width / 2, 312);

        ctx.fillStyle = '#888';
        ctx.font = '12px Courier New';
        ctx.fillText(isMobile ? 'Tap screen to continue' : 'Type name, press ENTER to save', canvas.width / 2, 340);
      } else {
        ctx.fillStyle = '#0f0';
        ctx.font = 'bold 14px Courier New';
        ctx.fillText(`Score saved as "${nameInput}"!`, canvas.width / 2, 280);

        const blink = Math.sin(frameCount * 0.05) > 0;
        if (blink) {
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 18px Courier New';
          ctx.fillText(isMobile ? 'TAP TO RESTART' : 'PRESS ENTER TO RESTART', canvas.width / 2, 320);
        }
      }

      ctx.fillStyle = '#666';
      ctx.font = '13px Courier New';
      ctx.fillText('Press TAB to view leaderboard', canvas.width / 2, 380);

      ctx.fillStyle = '#fff';
      ctx.font = '14px Courier New';
      ctx.fillText(`HIGH SCORE: ${highScore}`, canvas.width / 2, 410);
    }

    // ============================================================
    // GAME INITIALIZATION
    // ============================================================
    function startGame() {
      gameState = 'playing';
      score = 0;
      frameCount = 0;
      difficulty = 1;
      scrollOffset = 0;
      comboCount = 0;
      comboTimer = 0;
      lives = MAX_LIVES;
      invincibleTimer = 0;
      currentZone = 'moon';
      zoneAnnouncement = '';
      zoneAnnouncementTimer = 0;
      roverTilt = 0;

      player.x = 150;
      player.y = GROUND_Y - ROVER_HEIGHT;
      player.vy = 0;
      player.lane = 'ground';
      player.targetLane = 'ground';
      player.isJumping = false;
      player.hasShield = false;
      player.shieldTimer = 0;
      player.lightRadius = BASE_LIGHT_RADIUS;
      player.lightTimer = 0;
      player.wheelAngle = 0;
      player.shootCooldown = 0;

      obstacles.length = 0;
      powerups.length = 0;
      particles.length = 0;
      explosionParticles.length = 0;
      comboPopups.length = 0;
      lasers.length = 0;
      ufos.length = 0;
      enemyBullets.length = 0;
      trailParticles.length = 0;

      shakeIntensity = 0;
      shakeDuration = 0;
      hurtFlashTimer = 0;
      dyingTimer = 0;
      hitPauseTimer = 0;
      pickupEffects.length = 0;
      lightPickupAnim = 0;
      shieldPickupAnim = 0;
      distanceTraveled = 0;
      ufosDestroyed = 0;
      rocksDestroyed = 0;
      paused = false;
      showLeaderboard = false;
      nameInput = '';
      nameSubmitted = false;

      // Level system reset
      currentLevel = 1;
      levelDistance = 0;
      levelComplete = false;
      levelTransitionTimer = 0;
      bossActive = false;
      bossDefeated = false;
      boss = null;
      glitchTimer = 0;
      glitchIntensity = 0;
      jumpCount = 0;
      roverDebris.length = 0;

      initTerrain();
      initStars();
      initMountains();
      startMusic();
    }

    // ============================================================
    // MAIN GAME LOOP
    // ============================================================
    function gameLoop() {
      requestAnimationFrame(gameLoop);
      
      // Frame rate limiter: only update at 60fps
      const currentTime = Date.now();
      const elapsedTime = currentTime - lastFrameTime;
      if (elapsedTime < FRAME_TIME) return; // Skip this frame if not enough time has passed
      lastFrameTime = currentTime;
      
      // Calculate delta time (in seconds, normalized to ~16.67ms at 60fps)
      deltaTime = Math.min(elapsedTime / FRAME_TIME, 2); // Cap at 2x to prevent huge jumps
      
      frameCount++;
      resetShake();
      applyShake();

      const theme = gameState === 'playing' || gameState === 'gameover'
        ? getThemeColors(getCurrentTheme())
        : { sky: '#000' };
      ctx.fillStyle = theme.sky;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (gameState === 'start') {
        updateStars();
        drawStartScreen();

      } else if (gameState === 'playing') {
        if (paused) {
          // Still draw the scene but frozen
          drawStars();
          drawCelestialBody();
          drawMountains();
          drawTerrain();
          drawObstacles();
          drawPowerups();
          drawTrail();
          drawParticles();
          drawExplosion();
          drawLasers();
          drawUFOs();
          drawEnemyBullets();
          drawBoss();
          drawPlayer();
          drawComboPopups();
          drawDarkness();
          drawUpperObstacleGlow();
          drawWarningIndicators();
          drawHUD();
          drawMinimap();
          drawPauseScreen();
          drawCRT();
        } else {
        difficulty = 1 + (currentLevel - 1) * 0.25 + (levelDistance / LEVEL_LENGTH) * 0.2;
        if (difficulty > 4) difficulty = 4;

        // Hit pause — freeze gameplay but keep effects running
        if (hitPauseTimer > 0) {
          hitPauseTimer--;
          updateExplosion();
          updateRoverDebris();
          updateParticles();
        } else {
        scrollOffset += SCROLL_SPEED * difficulty;
        distanceTraveled += SCROLL_SPEED * difficulty;

        // Update all systems
        updateStars();
        updateMountains();
        updateTerrain();
        updatePlayer();
        updateLevelSystem();
        if (!levelComplete) {
          updateObstacles();
          updateUFOs();
          // Direct upper lane obstacle spawn
          if (frameCount % 150 === 0 && !bossActive) {
            const uh = 20 + Math.random() * 15;
            obstacles.push({ x: canvas.width + 50, y: PLATFORM_Y - uh, width: 35, height: uh, type: 'rock', lane: 'upper', passed: false });
          }
        }
        updatePowerups();
        updateParticles();
        updateComboSystem();
        updateLasers();
        updateBoss();
        updateEnemyBullets();
        updateExplosion();
        updateRoverDebris();
        updateTrail();
        updatePickupEffects();

        score++;

        if (!levelComplete) {
          checkCollisions();
          checkTerrainGaps();
        }
        } // end hit pause else

        // Draw all layers (order matters)
        drawStars();
        drawCelestialBody();
        drawMountains();
        drawTerrain();
        drawObstacles();
        drawPowerups();
        drawTrail();
        drawParticles();
        drawExplosion();
        drawRoverDebris();
        drawLasers();
        drawUFOs();
        drawEnemyBullets();
        drawBoss();
        drawPlayer();
        drawComboPopups();
        drawDarkness();
        drawUpperObstacleGlow();
        drawPickupEffects();
        drawWarningIndicators();
        drawHUD();
        drawMinimap();
        drawGlitch();
        drawHurtFlash();
        drawCRT();
        }

      } else if (gameState === 'dying') {
        updateExplosion();
        updateRoverDebris();
        dyingTimer--;
        if (dyingTimer <= 0) gameState = 'gameover';

        drawStars();
        drawCelestialBody();
        drawMountains();
        drawTerrain();
        drawObstacles();
        drawPowerups();
        drawExplosion();
        drawRoverDebris();
        drawDarkness();
        drawGlitch();
        drawHurtFlash();
        drawCRT();

      } else if (gameState === 'gameover') {
        updateExplosion();
        updateRoverDebris();

        drawStars();
        drawCelestialBody();
        drawMountains();
        drawTerrain();
        drawObstacles();
        drawPowerups();
        drawExplosion();
        drawRoverDebris();
        drawUFOs();
        drawEnemyBullets();
        drawDarkness();
        drawGlitch();
        drawHurtFlash();
        drawGameOverScreen();
        drawCRT();
      }

      resetShake();
    }

    // ============================================================
    // BOOT
    // ============================================================
    // Load high score from leaderboard
    const savedLB = getLeaderboard();
    if (savedLB.length > 0) highScore = savedLB[0].score;

    initStars();
    initMountains();
    gameLoop();
  </script>
</body>
</html>
