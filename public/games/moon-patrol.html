<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moon Patrol: Dark Frontier</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }

    canvas {
      border: 2px solid #333;
      image-rendering: pixelated;
      touch-action: none;
      max-width: 100vw;
      max-height: 100vh;
      width: 100%;
      height: auto;
    }
    #mobileControls {
      display: none;
      position: fixed;
      bottom: 10px;
      left: 10px;
      right: 10px;
      z-index: 100;
      pointer-events: none;
    }
    #mobileControls.active {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .touch-btn {
      pointer-events: auto;
      width: 60px; height: 60px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; color: #fff;
      user-select: none; -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .touch-btn:active, .touch-btn.pressed {
      background: rgba(255,255,255,0.3);
      border-color: rgba(255,255,255,0.5);
    }
    .touch-group { display: flex; gap: 8px; align-items: flex-end; }
    .touch-dpad { display: flex; flex-direction: column; gap: 4px; align-items: center; }
    .touch-dpad-row { display: flex; gap: 4px; }
    .touch-btn.small { width: 50px; height: 50px; font-size: 20px; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="mobileControls">
    <div class="touch-group">
      <div class="touch-dpad">
        <button class="touch-btn small" id="btnUp">&#9650;</button>
        <div class="touch-dpad-row">
          <button class="touch-btn small" id="btnLeft">&#9664;</button>
          <button class="touch-btn small" id="btnRight">&#9654;</button>
        </div>
        <button class="touch-btn small" id="btnDown">&#9660;</button>
      </div>
    </div>
    <div class="touch-group">
      <button class="touch-btn" id="btnJump" style="font-size:18px;">JUMP</button>
      <button class="touch-btn" id="btnShoot" style="background:rgba(255,80,80,0.2);border-color:rgba(255,80,80,0.4);font-size:18px;">FIRE</button>
    </div>
  </div>

  <script>
    // ============================================================
    // CANVAS SETUP
    // ============================================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || ('ontouchstart' in window) || (window.innerWidth < 900);
    const BASE_W = 900, BASE_H = 500;
    canvas.width = BASE_W;
    canvas.height = BASE_H;
    function resizeCanvas() {
      const ratio = BASE_W / BASE_H;
      let w = window.innerWidth, h = window.innerHeight;
      if (isMobile) {
        canvas.style.width = w + 'px';
        canvas.style.height = Math.min(h * 0.72, w / ratio) + 'px';
      } else {
        if (w / h > ratio) { canvas.style.height = h + 'px'; canvas.style.width = (h * ratio) + 'px'; }
        else { canvas.style.width = w + 'px'; canvas.style.height = (w / ratio) + 'px'; }
      }
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Pre-render CRT scanline overlay for performance
    const crtCanvas = document.createElement('canvas');
    const crtCtx = crtCanvas.getContext('2d');
    crtCanvas.width = canvas.width;
    crtCanvas.height = canvas.height;
    (function buildCRT() {
      crtCtx.fillStyle = 'rgba(0, 0, 0, 0.12)';
      for (let y = 0; y < crtCanvas.height; y += 3) {
        crtCtx.fillRect(0, y, crtCanvas.width, 1);
      }
      // Vignette corners
      const vg = crtCtx.createRadialGradient(
        crtCanvas.width / 2, crtCanvas.height / 2, crtCanvas.height * 0.4,
        crtCanvas.width / 2, crtCanvas.height / 2, crtCanvas.height * 0.8
      );
      vg.addColorStop(0, 'rgba(0,0,0,0)');
      vg.addColorStop(1, 'rgba(0,0,0,0.35)');
      crtCtx.fillStyle = vg;
      crtCtx.fillRect(0, 0, crtCanvas.width, crtCanvas.height);
    })();

    // ============================================================
    // GAME CONSTANTS
    // ============================================================
    const GROUND_Y = 400;
    const PLATFORM_Y = 280;
    const GRAVITY = 0.6;
    const JUMP_FORCE = -12;
    const SCROLL_SPEED = 3;
    const ROVER_WIDTH = 60;
    const ROVER_HEIGHT = 30;
    const WHEEL_RADIUS = 8;
    const BASE_LIGHT_RADIUS = 200;
    const BOOSTED_LIGHT_RADIUS = 380;
    const NEAR_MISS_THRESHOLD = 20;
    const THEME_MARS = 1500;
    const THEME_ASTEROID = 3500;

    // ============================================================
    // GAME STATE VARIABLES
    // ============================================================
    let gameState = 'start';
    let score = 0;
    let highScore = 0;
    let scrollOffset = 0;
    let frameCount = 0;
    let difficulty = 1;
    let lastTime = Date.now();
    let deltaTime = 0;
    let lastFrameTime = 0;
    const TARGET_FPS = 60;
    const FRAME_TIME = 1000 / TARGET_FPS; // ~16.67ms for 60fps
    let shakeDuration = 0;
    let comboCount = 0;
    let comboTimer = 0;
    let lastComboScore = 0;
    const comboPopups = [];
    const explosionParticles = [];

    // Lives system
    let lives = 3;
    const MAX_LIVES = 3;
    let invincibleTimer = 0; // Brief invincibility after taking a hit

    // Zone transition announcement
    let currentZone = 'moon';
    let zoneAnnouncement = '';
    let zoneAnnouncementTimer = 0;

    // Rover tilt angle (visual only)
    let roverTilt = 0;

    // Pause system
    let paused = false;

    // Colorblind mode (blue/orange palette instead of red/green)
    let colorblindMode = localStorage.getItem('moonPatrolCB') === 'true';
    function cb(normal, cbAlt) { return colorblindMode ? cbAlt : normal; }

    // Distance meter
    let distanceTraveled = 0;

    // Kill stats
    let ufosDestroyed = 0;
    let rocksDestroyed = 0;

    // Rover trail particles
    const trailParticles = [];

    // Level system
    let currentLevel = 1;
    let levelDistance = 0;          // Distance within current level
    const LEVEL_LENGTH = 3000;     // Distance units per level
    let levelComplete = false;
    let levelTransitionTimer = 0;
    let bossActive = false;
    let bossDefeated = false;

    // Boss system
    let boss = null;

    // Screen glitch effect
    let glitchTimer = 0;
    let glitchIntensity = 0;

    // Double jump
    let jumpCount = 0;
    const MAX_JUMPS_BASE = 1;

    // Rover debris for animated game over
    const roverDebris = [];

    // Leaderboard (localStorage)
    function getLeaderboard() {
      try {
        return JSON.parse(localStorage.getItem('moonPatrolLeaderboard') || '[]');
      } catch { return []; }
    }
    function saveToLeaderboard(name, sc) {
      const lb = getLeaderboard();
      lb.push({ name, score: sc, date: new Date().toLocaleDateString() });
      lb.sort((a, b) => b.score - a.score);
      if (lb.length > 10) lb.length = 10;
      localStorage.setItem('moonPatrolLeaderboard', JSON.stringify(lb));
    }
    let showLeaderboard = false;
    let nameInput = '';
    let nameSubmitted = false;

    // ============================================================
    // SOUND SYSTEM (Web Audio API - retro oscillator beeps)
    // ============================================================
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      // Resume audio context if suspended (required by modern browsers)
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function playSound(freq, duration, type = 'square', volume = 0.15) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(volume, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function sfxJump() {
      playSound(300, 0.15, 'square');
      playSound(500, 0.1, 'square', 0.1);
    }
    function sfxLand() { playSound(100, 0.1, 'triangle', 0.1); }
    function sfxPowerup() {
      playSound(600, 0.08, 'square', 0.12);
      setTimeout(() => playSound(800, 0.08, 'square', 0.12), 60);
      setTimeout(() => playSound(1000, 0.12, 'square', 0.12), 120);
    }
    function sfxNearMiss() {
      playSound(1200, 0.06, 'sine', 0.08);
      setTimeout(() => playSound(1600, 0.06, 'sine', 0.08), 50);
    }
    function sfxShieldHit() {
      playSound(200, 0.2, 'sawtooth', 0.12);
      playSound(400, 0.15, 'square', 0.08);
    }
    function sfxExplosion() {
      playSound(80, 0.4, 'sawtooth', 0.2);
      playSound(60, 0.5, 'square', 0.15);
      setTimeout(() => playSound(40, 0.3, 'sawtooth', 0.1), 100);
      setTimeout(() => playSound(120, 0.2, 'triangle', 0.08), 200);
    }
    function sfxLaneSwitch() { playSound(400, 0.06, 'sine', 0.06); }
    function sfxShoot() { playSound(800, 0.08, 'square', 0.1); }
    function sfxHitEnemy() {
      playSound(200, 0.15, 'square', 0.12);
      playSound(100, 0.2, 'sawtooth', 0.08);
    }
    function sfxEnemyShoot() { playSound(150, 0.12, 'sawtooth', 0.06); }
    function sfxLifeLost() {
      playSound(400, 0.15, 'square', 0.15);
      setTimeout(() => playSound(300, 0.15, 'square', 0.12), 120);
      setTimeout(() => playSound(200, 0.25, 'square', 0.1), 240);
    }
    function sfxZoneChange() {
      playSound(500, 0.1, 'sine', 0.1);
      setTimeout(() => playSound(700, 0.1, 'sine', 0.1), 100);
      setTimeout(() => playSound(900, 0.1, 'sine', 0.1), 200);
      setTimeout(() => playSound(1200, 0.2, 'sine', 0.12), 300);
    }

    // ============================================================
    // CHIPTUNE MUSIC SYSTEM
    // Generates a looping retro melody using Web Audio oscillators
    // ============================================================
    let musicPlaying = false;
    let musicInterval = null;
    let musicStep = 0;

    // Epic dark space patrol melody (original composition in E minor)
    const melodyNotes = [
      // Phrase 1: Driving, urgent patrol motif
      330, 0, 494, 0, 659, 0, 494, 0,
      330, 0, 392, 0, 370, 0, 0, 0,
      // Phrase 2: Rising tension
      294, 0, 440, 0, 587, 0, 440, 0,
      294, 0, 370, 0, 330, 0, 0, 0,
      // Phrase 3: Epic peak - octave jumps
      659, 0, 784, 0, 659, 0, 587, 0,
      494, 0, 587, 0, 659, 0, 0, 0,
      // Phrase 4: Descending resolve with suspense
      587, 0, 494, 0, 440, 0, 392, 0,
      330, 0, 370, 0, 330, 0, 0, 0
    ];

    // Pulsing bass line - driving minor key pattern
    const bassNotes = [
      82, 0, 82, 82, 0, 82, 82, 0,
      110, 0, 110, 110, 0, 110, 82, 0,
      73, 0, 73, 73, 0, 73, 73, 0,
      98, 0, 98, 98, 0, 98, 73, 0,
      82, 0, 82, 82, 0, 110, 110, 0,
      123, 0, 123, 110, 0, 98, 82, 0,
      73, 0, 73, 73, 0, 82, 82, 0,
      98, 0, 98, 82, 0, 73, 82, 0
    ];

    // Arpeggio layer for extra epicness
    const arpNotes = [
      0, 165, 0, 247, 0, 330, 0, 247,
      0, 165, 0, 196, 0, 185, 0, 0,
      0, 147, 0, 220, 0, 294, 0, 220,
      0, 147, 0, 185, 0, 165, 0, 0,
      0, 330, 0, 392, 0, 330, 0, 294,
      0, 247, 0, 294, 0, 330, 0, 0,
      0, 294, 0, 247, 0, 220, 0, 196,
      0, 165, 0, 185, 0, 165, 0, 0
    ];

    function startMusic() {
      if (musicPlaying || !audioCtx) return;
      musicPlaying = true;
      musicStep = 0;

      musicInterval = setInterval(() => {
        if (gameState !== 'playing') return;

        const noteIndex = musicStep % melodyNotes.length;

        // Lead melody - sawtooth for gritty space feel
        const note = melodyNotes[noteIndex];
        if (note > 0) {
          playSound(note, 0.1, 'sawtooth', 0.035);
        }

        // Driving bass pulse
        const bass = bassNotes[noteIndex];
        if (bass > 0) {
          playSound(bass, 0.12, 'triangle', 0.06);
        }

        // Arpeggio shimmer layer
        const arp = arpNotes[noteIndex];
        if (arp > 0) {
          playSound(arp, 0.08, 'sine', 0.025);
        }

        musicStep++;
      }, 120);
    }

    function stopMusic() {
      if (musicInterval) {
        clearInterval(musicInterval);
        musicInterval = null;
      }
      musicPlaying = false;
    }

    // ============================================================
    // INPUT HANDLING
    // ============================================================
    const keys = {};

    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;

      // Colorblind toggle (works in any state)
      if (e.code === 'KeyC' && gameState !== 'gameover') {
        colorblindMode = !colorblindMode;
        localStorage.setItem('moonPatrolCB', colorblindMode);
      }

      if (gameState === 'start' && e.code === 'Tab') {
        e.preventDefault();
        showLeaderboard = !showLeaderboard;
      }
      if (gameState === 'start' && e.code === 'Enter') {
        initAudio();
        showLeaderboard = false;
        startGame();
      }
      // Pause toggle
      if (gameState === 'playing' && e.code === 'KeyP') {
        paused = !paused;
        if (paused && musicPlaying) stopMusic();
        if (!paused) startMusic();
      }
      if (gameState === 'gameover') {
        // TAB toggles leaderboard view at any time
        if (e.code === 'Tab') {
          e.preventDefault();
          showLeaderboard = !showLeaderboard;
        }
        // Name input only when NOT viewing leaderboard and NOT yet submitted
        else if (!nameSubmitted && !showLeaderboard) {
          if (e.code === 'Backspace') {
            nameInput = nameInput.slice(0, -1);
          } else if (e.code === 'Enter') {
            if (nameInput.length > 0) {
              saveToLeaderboard(nameInput, score);
              nameSubmitted = true;
            } else {
              nameSubmitted = true;
              startGame();
            }
          } else if (e.key.length === 1 && nameInput.length < 8) {
            nameInput += e.key.toUpperCase();
          }
        }
        // After submitting or while viewing leaderboard, Enter restarts
        else if (e.code === 'Enter' && (nameSubmitted || showLeaderboard)) {
          startGame();
        }
      }
      if (gameState === 'playing' && e.code === 'Space') {
        playerJump();
        e.preventDefault();
      }
      if (gameState === 'playing' && e.code === 'ArrowUp') {
        if (player.targetLane !== 'upper') {
          player.targetLane = 'upper';
          sfxLaneSwitch();
        }
        e.preventDefault();
      }
      if (gameState === 'playing' && e.code === 'ArrowDown') {
        if (player.targetLane !== 'ground') {
          player.targetLane = 'ground';
          sfxLaneSwitch();
        }
        e.preventDefault();
      }
      // Shoot with X or Z key
      if (gameState === 'playing' && (e.code === 'KeyX' || e.code === 'KeyZ')) {
        playerShoot();
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });

    // MOBILE TOUCH SYSTEM
    const mobileControls = document.getElementById('mobileControls');
    function updateMobileUI() {
      if (isMobile && gameState === 'playing' && !paused) mobileControls.classList.add('active');
      else mobileControls.classList.remove('active');
    }
    setInterval(updateMobileUI, 300);

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault(); initAudio();
      if (gameState === 'start') { showLeaderboard = false; startGame(); return; }
      if (gameState === 'gameover') {
        if (!nameSubmitted) { nameSubmitted = true; nameInput = 'PLAYER'; saveToLeaderboard(nameInput, score); }
        startGame(); return;
      }
      if (gameState === 'playing' && paused) { paused = false; startMusic(); }
    }, { passive: false });

    canvas.addEventListener('click', () => {
      initAudio();
      if (gameState === 'start') { showLeaderboard = false; startGame(); return; }
      if (gameState === 'gameover') {
        if (!nameSubmitted) { nameSubmitted = true; nameInput = 'PLAYER'; saveToLeaderboard(nameInput, score); }
        startGame(); return;
      }
    });

    function setupBtn(id, kc, fn) {
      const b = document.getElementById(id); if (!b) return;
      b.addEventListener('touchstart', (e) => { e.preventDefault(); e.stopPropagation(); keys[kc] = true; b.classList.add('pressed'); if (fn) fn(); }, { passive: false });
      b.addEventListener('touchend', (e) => { e.preventDefault(); keys[kc] = false; b.classList.remove('pressed'); }, { passive: false });
      b.addEventListener('touchcancel', () => { keys[kc] = false; b.classList.remove('pressed'); });
    }
    setupBtn('btnUp', 'ArrowUp', () => { if (gameState === 'playing' && player.targetLane !== 'upper') { player.targetLane = 'upper'; sfxLaneSwitch(); } });
    setupBtn('btnDown', 'ArrowDown', () => { if (gameState === 'playing' && player.targetLane !== 'ground') { player.targetLane = 'ground'; sfxLaneSwitch(); } });
    setupBtn('btnLeft', 'ArrowLeft');
    setupBtn('btnRight', 'ArrowRight');

    const _btnJ = document.getElementById('btnJump');
    if (_btnJ) {
      _btnJ.addEventListener('touchstart', (e) => { e.preventDefault(); e.stopPropagation(); if (gameState === 'playing') playerJump(); _btnJ.classList.add('pressed'); }, { passive: false });
      _btnJ.addEventListener('touchend', (e) => { e.preventDefault(); _btnJ.classList.remove('pressed'); }, { passive: false });
    }
    const _btnS = document.getElementById('btnShoot');
    if (_btnS) {
      _btnS.addEventListener('touchstart', (e) => { e.preventDefault(); e.stopPropagation(); if (gameState === 'playing') playerShoot(); keys['KeyX'] = true; _btnS.classList.add('pressed'); }, { passive: false });
      _btnS.addEventListener('touchend', (e) => { e.preventDefault(); keys['KeyX'] = false; _btnS.classList.remove('pressed'); }, { passive: false });
    }

    // ============================================================
    // PLAYER OBJECT
    // ============================================================
    const player = {
      x: 150,
      y: GROUND_Y - ROVER_HEIGHT,
      vy: 0,
      width: ROVER_WIDTH,
      height: ROVER_HEIGHT,
      lane: 'ground',
      targetLane: 'ground',
      isJumping: false,
      hasShield: false,
      shieldTimer: 0,
      lightRadius: BASE_LIGHT_RADIUS,
      lightTimer: 0,
      wheelAngle: 0,
      shootCooldown: 0
    };

    function playerJump() {
      const maxJumps = currentLevel >= 3 ? 2 : MAX_JUMPS_BASE; // Double jump from level 3+
      if (jumpCount < maxJumps) {
        player.vy = jumpCount === 0 ? JUMP_FORCE : JUMP_FORCE * 0.8;
        player.isJumping = true;
        jumpCount++;
        if (jumpCount === 1) spawnDustParticles();
        sfxJump();
      }
    }

    function getLaneY(lane) {
      return lane === 'upper' ? PLATFORM_Y - ROVER_HEIGHT : GROUND_Y - ROVER_HEIGHT;
    }

    // ============================================================
    // PLAYER LASER SYSTEM
    // ============================================================
    const lasers = [];

    function playerShoot() {
      if (player.shootCooldown > 0) return;
      player.shootCooldown = 12; // Fire rate limiter

      lasers.push({
        x: player.x + player.width,
        y: player.y + 8,
        speed: 8,
        width: 16,
        height: 3
      });
      sfxShoot();
    }

    function updateLasers() {
      for (let i = lasers.length - 1; i >= 0; i--) {
        lasers[i].x += lasers[i].speed * deltaTime;
        if (lasers[i].x > canvas.width + 20) {
          lasers.splice(i, 1);
        }
      }
      if (player.shootCooldown > 0) player.shootCooldown--;
    }

    function drawLasers() {
      for (const l of lasers) {
        // Laser glow
        ctx.fillStyle = cb('rgba(0, 255, 100, 0.3)', 'rgba(80, 160, 255, 0.3)');
        ctx.fillRect(l.x - 2, l.y - 2, l.width + 4, l.height + 4);
        // Laser core
        ctx.fillStyle = cb('#0f8', '#4af');
        ctx.fillRect(l.x, l.y, l.width, l.height);
        ctx.fillStyle = '#fff';
        ctx.fillRect(l.x + 2, l.y + 1, l.width - 4, 1);
      }
    }

    // ============================================================
    // ENEMY UFO SYSTEM
    // ============================================================
    const ufos = [];
    const enemyBullets = [];

    function spawnUFO() {
      const yPos = 60 + Math.random() * (PLATFORM_Y - 120);
      ufos.push({
        x: canvas.width + 40,
        y: yPos,
        width: 40,
        height: 18,
        hp: 2,
        speed: 1.5 + Math.random() * 1,
        shootTimer: 90 + Math.floor(Math.random() * 60),
        bobPhase: Math.random() * Math.PI * 2,
        flashTimer: 0 // Visual flash when hit
      });
    }

    function updateUFOs() {
      const speed = SCROLL_SPEED * difficulty * deltaTime;

      for (let i = ufos.length - 1; i >= 0; i--) {
        const ufo = ufos[i];
        ufo.x -= (ufo.speed + speed * 0.3) * deltaTime;
        ufo.bobPhase += 0.04;
        if (ufo.flashTimer > 0) ufo.flashTimer--;

        // UFO shooting
        ufo.shootTimer--;
        if (ufo.shootTimer <= 0) {
          ufo.shootTimer = 100 + Math.floor(Math.random() * 50);
          // Shoot a bullet downward toward the player
          const angle = Math.atan2(
            (player.y + player.height / 2) - (ufo.y + ufo.height / 2),
            (player.x + player.width / 2) - (ufo.x + ufo.width / 2)
          );
          enemyBullets.push({
            x: ufo.x + ufo.width / 2,
            y: ufo.y + ufo.height,
            vx: Math.cos(angle) * 3,
            vy: Math.sin(angle) * 3,
            size: 4
          });
          sfxEnemyShoot();
        }

        // Remove off-screen
        if (ufo.x + ufo.width < -50) {
          ufos.splice(i, 1);
          continue;
        }

        // Check laser hits on UFO
        for (let j = lasers.length - 1; j >= 0; j--) {
          const l = lasers[j];
          if (
            l.x < ufo.x + ufo.width &&
            l.x + l.width > ufo.x &&
            l.y < ufo.y + ufo.height + Math.sin(ufo.bobPhase) * 8 &&
            l.y + l.height > ufo.y + Math.sin(ufo.bobPhase) * 8
          ) {
            lasers.splice(j, 1);
            ufo.hp--;
            ufo.flashTimer = 6;
            if (ufo.hp <= 0) {
              // UFO destroyed - bonus points + explosion
              score += 200;
              ufosDestroyed++;
              comboPopups.push({
                x: ufo.x + ufo.width / 2,
                y: ufo.y - 10,
                text: '+200 DESTROYED!',
                life: 80,
                color: '#f80'
              });
              spawnSmallExplosion(ufo.x + ufo.width / 2, ufo.y + ufo.height / 2);
              sfxHitEnemy();
              ufos.splice(i, 1);
            } else {
              sfxShieldHit();
            }
            break;
          }
        }
      }

      // Spawn UFOs periodically (not during boss fight)
      if (!bossActive && !levelComplete) {
        const ufoRate = Math.max(120, 300 - difficulty * 40);
        if (frameCount % ufoRate === 0 && frameCount > 60) {
          spawnUFO();
        }
      }
    }

    function drawUFOs() {
      for (const ufo of ufos) {
        const bobY = ufo.y + Math.sin(ufo.bobPhase) * 8;
        const isFlashing = ufo.flashTimer > 0;

        // UFO body (saucer shape)
        ctx.fillStyle = isFlashing ? '#fff' : '#8a8';
        ctx.beginPath();
        ctx.ellipse(ufo.x + ufo.width / 2, bobY + ufo.height / 2, ufo.width / 2, ufo.height / 3, 0, 0, Math.PI * 2);
        ctx.fill();

        // UFO dome
        ctx.fillStyle = isFlashing ? '#ffa' : '#aca';
        ctx.beginPath();
        ctx.ellipse(ufo.x + ufo.width / 2, bobY + 2, 12, 8, 0, Math.PI, 0);
        ctx.fill();

        // UFO lights
        const lightPhase = frameCount * 0.15;
        for (let k = 0; k < 3; k++) {
          const lx = ufo.x + 8 + k * 12;
          const brightness = Math.sin(lightPhase + k * 2) * 0.5 + 0.5;
          ctx.fillStyle = `rgba(255, 100, 100, ${brightness})`;
          ctx.beginPath();
          ctx.arc(lx, bobY + ufo.height / 2 + 2, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    // Small explosion for destroyed UFOs
    function spawnSmallExplosion(cx, cy) {
      for (let i = 0; i < 15; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 4;
        explosionParticles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 30 + Math.random() * 20,
          size: 2 + Math.random() * 3,
          color: Math.random() < 0.4 ? '#0f8' : Math.random() < 0.7 ? '#ff4' : '#f80'
        });
      }
    }

    // ============================================================
    // ENEMY BULLETS
    // ============================================================
    function updateEnemyBullets() {
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const b = enemyBullets[i];
        b.x += b.vx * deltaTime;
        b.y += b.vy * deltaTime;

        // Off-screen removal
        if (b.x < -20 || b.x > canvas.width + 20 || b.y > canvas.height + 20 || b.y < -20) {
          enemyBullets.splice(i, 1);
          continue;
        }

        // Hit player check
        if (invincibleTimer <= 0 &&
          b.x > player.x && b.x < player.x + player.width &&
          b.y > player.y && b.y < player.y + player.height
        ) {
          enemyBullets.splice(i, 1);
          if (player.hasShield) {
            player.hasShield = false;
            player.shieldTimer = 0;
            sfxShieldHit();
            triggerShake(4, 10);
          } else {
            loseLife();
          }
          return;
        }
      }
    }

    function drawEnemyBullets() {
      for (const b of enemyBullets) {
        // Bullet glow
        ctx.fillStyle = cb('rgba(255, 80, 80, 0.4)', 'rgba(255, 140, 0, 0.4)');
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.size + 2, 0, Math.PI * 2);
        ctx.fill();
        // Bullet core
        ctx.fillStyle = cb('#f44', '#f80');
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = cb('#faa', '#fc8');
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.size * 0.4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
